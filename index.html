<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StoryQuant</title>
<script>
// 모바일/태블릿 → shorts.html · 데스크탑 → story_quant.html
// 단 URL에 ?force=desktop / ?force=mobile 있으면 강제 우회
(function() {
  var q = new URLSearchParams(location.search);
  var force = q.get('force');
  var isMobile;
  if (force === 'mobile') isMobile = true;
  else if (force === 'desktop') isMobile = false;
  else {
    // viewport width + UA 둘 다 체크 (UA 단독은 spoofing 위험)
    isMobile = window.innerWidth <= 768 ||
      /Android|iPhone|iPad|iPod|Mobile|BlackBerry|webOS|Opera Mini|IEMobile/i.test(navigator.userAgent);
  }
  location.replace(isMobile ? './shorts.html' : './story_quant.html');
})();
</script>
<style>
  html, body { background: #0c0b0a; color: #aaa; margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .logo { font-size: 28px; font-weight: 800; background: linear-gradient(120deg, #ff4836, #f4c869); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .spin { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #ff4836; border-radius: 50%; animation: s 0.7s linear infinite; }
  @keyframes s { to { transform: rotate(360deg); } }
  .links { font-size: 11px; opacity: 0.5; margin-top: 30px; }
  .links a { color: #aaa; margin: 0 8px; }
</style>
</head>
<body>
  <div class="logo">StoryQuant</div>
  <div class="spin"></div>
  <div style="font-size:11px;opacity:0.6;">리디렉션 중...</div>
  <div class="links">
    <a href="./shorts.html">📱 모바일</a>
    <a href="./story_quant.html?force=desktop">🖥 데스크탑</a>
  </div>
</body>
</html>
