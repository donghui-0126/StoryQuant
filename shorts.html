<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- 보안 — CSP -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://127.0.0.1:8765 https://*.trycloudflare.com https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; frame-ancestors 'none';">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>StoryQuant Shorts</title>
<!-- Supabase SDK (있으면 클라우드 모드, 없거나 미설정 시 localStorage fallback) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #000;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif;
    overflow: hidden;
    height: 100%;
    height: 100dvh;
    user-select: none;
    -webkit-user-select: none;
  }

  /* desktop = phone frame 가운데, mobile = 풀스크린 */
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .phone {
    width: 100%; height: 100%;
    max-width: 100vw; max-height: 100vh;
    background: #000;
    position: relative;
    overflow: hidden;
  }
  @media (min-width: 500px) {
    body { padding: 20px; }
    .phone {
      width: 390px; height: 844px;
      max-height: calc(100vh - 40px);
      border: 8px solid #1a1a1a;
      border-radius: 38px;
    }
  }

  /* top progress bar */
  .progress {
    position: absolute; top: max(env(safe-area-inset-top, 0px), 10px); left: 10px; right: 10px;
    display: flex; gap: 3px; z-index: 20;
  }
  .progress .seg {
    flex: 1; height: 2.5px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px; overflow: hidden;
  }
  .progress .seg .fill { height: 100%; background: white; width: 0; transition: width 0.3s linear; }
  .progress .seg.done .fill { width: 100%; }
  .progress .seg.now .fill { width: 100%; }

  /* top meta */
  .top-meta {
    position: absolute; top: calc(max(env(safe-area-inset-top, 0px), 10px) + 14px);
    left: 14px; right: 14px;
    z-index: 19;
    display: flex; justify-content: space-between; align-items: center;
    color: white; font-size: 11px;
  }
  .top-meta .cat-chip {
    background: rgba(255,255,255,0.18);
    padding: 4px 10px; border-radius: 999px;
    backdrop-filter: blur(8px);
    font-weight: 600; letter-spacing: 0.04em;
  }
  .top-meta .regime-chip {
    background: rgba(255,72,54,0.4);
    padding: 4px 10px; border-radius: 999px;
    backdrop-filter: blur(8px);
    font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .top-meta .counter { opacity: 0.7; font-variant-numeric: tabular-nums; }

  /* reels stack */
  .reels {
    position: absolute; inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .reels::-webkit-scrollbar { display: none; }

  .reel {
    width: 100%; height: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
    display: flex; flex-direction: column;
    padding: 80px 18px 80px;
    color: white;
    overflow: hidden;
  }
  .reel.up   { background: radial-gradient(circle at 70% 25%, rgba(74,222,128,0.22), transparent 55%), linear-gradient(180deg, rgba(74,222,128,0.10), #0a0908 70%); }
  .reel.upS  { background: radial-gradient(circle at 70% 25%, rgba(74,222,128,0.35), transparent 55%), linear-gradient(180deg, rgba(74,222,128,0.18), #0a0908 70%); }
  .reel.dn   { background: radial-gradient(circle at 70% 25%, rgba(239,68,68,0.22), transparent 55%), linear-gradient(180deg, rgba(239,68,68,0.10), #0a0908 70%); }
  .reel.dnS  { background: radial-gradient(circle at 70% 25%, rgba(239,68,68,0.35), transparent 55%), linear-gradient(180deg, rgba(239,68,68,0.18), #0a0908 70%); }
  .reel.flat { background: linear-gradient(180deg, #15130f, #0a0908 70%); }
  .reel.mystery { background: radial-gradient(circle at 70% 25%, rgba(167,139,250,0.30), transparent 55%), linear-gradient(180deg, rgba(167,139,250,0.15), #0a0908 70%); }

  .ticker-row { font-size: 11px; opacity: 0.75; margin-bottom: 6px; letter-spacing: 0.02em; }
  .sector-info-line {
    font-size: 10.5px; opacity: 0.78;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    padding: 5px 8px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .sector-info-line .sec-name { color: #f4c869; font-weight: 600; }
  .sector-info-line .sec-pol-pos { color: #4ade80; font-weight: 600; }
  .sector-info-line .sec-pol-neg { color: #ef4444; font-weight: 600; }
  .sector-info-line .sec-pol-flat { color: rgba(255,255,255,0.5); font-weight: 600; }
  .reel h3 { font-size: 24px; margin-bottom: 14px; font-weight: 700; letter-spacing: -0.01em; }

  .change-hero {
    font-size: 56px; font-weight: 800;
    line-height: 1; margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }
  .change-hero.up { color: #4ade80; text-shadow: 0 0 30px rgba(74,222,128,0.45); }
  .change-hero.dn { color: #ef4444; text-shadow: 0 0 30px rgba(239,68,68,0.45); }
  .change-hero.flat { color: #aaa39a; }
  .change-sub { font-size: 11px; opacity: 0.65; margin-bottom: 18px; font-variant-numeric: tabular-nums; }

  /* 종목 vs 코스피 비교 박스 */
  .compare-box {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 14px;
  }
  .compare-box.compare-2x2 { gap: 5px; }
  .compare-box .cmp-cell {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 8px;
    text-align: center;
  }
  .compare-box .cmp-cell .lbl {
    font-size: 9.5px; opacity: 0.55;
    text-transform: uppercase; letter-spacing: 0.03em;
    margin-bottom: 3px;
  }
  .compare-box .cmp-cell .val {
    font-size: 16px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .compare-box .cmp-cell .val.up { color: #4ade80; }
  .compare-box .cmp-cell .val.dn { color: #ef4444; }
  .compare-box .cmp-cell .val.flat { color: rgba(255,255,255,0.65); }
  .compare-box .cmp-cell .sub-lbl {
    font-size: 9px; opacity: 0.45;
    margin-top: 4px;
  }
  .compare-box .cmp-cell.stock { background: rgba(255,255,255,0.07); }
  .compare-box .cmp-cell.bench { background: rgba(244,200,105,0.06); border-color: rgba(244,200,105,0.15); }

  .why-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .why-label { font-size: 9px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
  .why-txt { font-size: 13px; line-height: 1.45; font-weight: 500; }
  .why-txt b { color: #4ade80; font-weight: 700; }
  .why-txt.dn b { color: #ef4444; }

  /* metrics row */
  .metrics {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 6px; margin-bottom: 14px;
    font-size: 10px;
  }
  .metric {
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 6px 8px;
    text-align: center;
  }
  .metric .l { opacity: 0.55; font-size: 9px; }
  .metric .v { font-size: 14px; font-weight: 700; margin-top: 1px; font-variant-numeric: tabular-nums; }

  .trust-badge {
    font-size: 10px;
    padding: 4px 10px; border-radius: 999px;
    align-self: flex-start;
    margin-bottom: auto;
    border: 1px solid;
  }
  .trust-badge.high { background: rgba(74,222,128,0.18); color: #4ade80; border-color: rgba(74,222,128,0.4); }
  .trust-badge.mid  { background: rgba(244,200,105,0.18); color: #f4c869; border-color: rgba(244,200,105,0.4); }
  .trust-badge.low  { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.2); }
  .trust-badge.mystery { background: rgba(167,139,250,0.18); color: #a78bfa; border-color: rgba(167,139,250,0.4); }

  /* right action rail */
  .actions-rail {
    position: absolute; right: 8px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 12px;
    z-index: 9;
  }
  .actions-rail .item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .actions-rail .ico {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .actions-rail .ico:active { transform: scale(0.92); }
  .actions-rail .item.on .ico { background: rgba(255,72,54,0.7); }
  .actions-rail .lab { font-size: 8px; opacity: 0.85; font-weight: 600; }

  /* swipe hint */
  .swipe-hint {
    position: absolute; bottom: 70px; left: 0; right: 60px;
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 9px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    pointer-events: none;
    animation: bounce 1.8s infinite;
  }
  .swipe-hint .arrow { font-size: 12px; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* bottom nav */
  .bot-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 6px 0 calc(8px + env(safe-area-inset-bottom, 0px));
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(14px);
    border-top: 0.5px solid rgba(255,255,255,0.1);
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    z-index: 15;
  }
  .bot-nav .it { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 14px; }
  .bot-nav .it .em { font-size: 16px; }
  .bot-nav .it.on { color: white; }

  /* ─── 점수를 클릭 가능하게 ─── */
  .change-hero, .change-sub { cursor: pointer; }
  .change-hero:active { transform: scale(0.97); transition: transform 0.1s; }
  .score-hint {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    opacity: 0.4;
    border: 1px solid currentColor;
    width: 14px; height: 14px;
    border-radius: 50%;
    line-height: 12px; text-align: center;
    vertical-align: middle;
  }

  /* ─── Bottom Sheet 모달 (공통) ─── */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-height: 82%;
    background: #1a1714;
    border-radius: 18px 18px 0 0;
    z-index: 51;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.22, .9, .3, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 500px) {
    .sheet { left: 50%; transform: translate(-50%, 100%); width: 374px; }
    .sheet.open { transform: translate(-50%, 0); }
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: rgba(255,255,255,0.25);
    border-radius: 999px; margin: 8px auto 4px;
    flex-shrink: 0;
  }
  .sheet-head {
    padding: 8px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .sheet-head h3 { font-size: 16px; color: white; margin-bottom: 2px; }
  .sheet-head .sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .sheet-body {
    flex: 1; overflow-y: auto;
    padding: 14px 18px 24px;
    -webkit-overflow-scrolling: touch;
  }

  /* ─── 점수 설명 모달 (가독성·신뢰감 강화) ─── */
  .score-explain section {
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .score-explain section:last-child { border-bottom: none; }
  .score-explain h4 {
    font-size: 11px; color: #f4c869;
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 10px; font-weight: 700;
  }
  .score-explain p {
    font-size: 15px;
    color: rgba(255,255,255,0.95);
    line-height: 1.7;
  }
  .score-explain p b { color: #4ade80; font-weight: 700; }
  .score-explain p .dn { color: #ef4444; font-weight: 700; }

  /* 한 줄 해석 — 구조화된 grid */
  .score-explain .attr-grid {
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .score-explain .attr-row {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 12px 14px;
    align-items: center;
  }
  .score-explain .attr-row .icon-cell {
    font-size: 22px;
    text-align: center;
    line-height: 1;
  }
  .score-explain .attr-row .body-cell {
    line-height: 1.5;
  }
  .score-explain .attr-row .title {
    font-size: 11px; color: rgba(255,255,255,0.55);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .score-explain .attr-row .value {
    font-size: 15px; color: white; font-weight: 600;
  }
  .score-explain .attr-row .value .pos { color: #4ade80; }
  .score-explain .attr-row .value .neg { color: #ef4444; }
  .score-explain .attr-row .value .flat { color: rgba(255,255,255,0.5); }
  .score-explain .attr-row .extra {
    font-size: 11px; color: rgba(255,255,255,0.5);
    margin-top: 3px;
  }
  .score-explain .match-box {
    border-radius: 10px; padding: 14px;
    margin-top: 4px;
    display: flex; align-items: center; gap: 12px;
  }
  .score-explain .match-box.ok {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.3);
  }
  .score-explain .match-box.gap {
    background: rgba(244,200,105,0.08);
    border: 1px solid rgba(244,200,105,0.3);
  }
  .score-explain .match-box.mystery {
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.3);
  }
  .score-explain .match-box .em { font-size: 22px; flex-shrink: 0; }
  .score-explain .match-box .verdict {
    font-size: 13px; line-height: 1.5;
    color: white;
  }
  .score-explain .match-box .verdict b { font-weight: 700; }
  .score-explain .match-box.ok .verdict b { color: #4ade80; }
  .score-explain .match-box.gap .verdict b { color: #f4c869; }
  .score-explain .match-box.mystery .verdict b { color: #a78bfa; }

  /* 공식 분해 — 큰 글씨 */
  .score-explain .formula-grid {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 8px 12px;
    font-size: 14px;
    margin: 10px 0;
  }
  .score-explain .formula-grid .label { color: rgba(255,255,255,0.85); }
  .score-explain .formula-grid .weight {
    color: rgba(255,255,255,0.45);
    font-variant-numeric: tabular-nums; font-size: 12px;
    align-self: center;
  }
  .score-explain .formula-grid .val {
    color: white; font-weight: 700; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .score-explain .formula-grid .val.up { color: #4ade80; }
  .score-explain .formula-grid .val.dn { color: #ef4444; }
  .score-explain .formula-grid .total {
    grid-column: 1 / -1;
    border-top: 1.5px solid rgba(255,255,255,0.15);
    padding-top: 10px; margin-top: 6px;
    display: flex; justify-content: space-between;
    font-size: 17px; font-weight: 800;
    color: #ff4836;
  }

  /* 신뢰 섹션 — Hero 형식 */
  .score-explain .trust-hero {
    background: linear-gradient(135deg, rgba(74,222,128,0.12), rgba(74,222,128,0.04));
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
    text-align: center;
  }
  .score-explain .trust-hero .big-num {
    font-size: 48px; font-weight: 800; color: #4ade80;
    line-height: 1; margin-bottom: 4px;
    text-shadow: 0 0 24px rgba(74,222,128,0.3);
  }
  .score-explain .trust-hero .big-label {
    font-size: 13px; color: rgba(255,255,255,0.85);
    margin-bottom: 8px;
  }
  .score-explain .trust-hero .big-context {
    font-size: 11px; color: rgba(255,255,255,0.55);
    font-style: italic;
  }
  .score-explain .trust-row {
    display: flex; justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    align-items: center;
  }
  .score-explain .trust-row .l { color: rgba(255,255,255,0.7); }
  .score-explain .trust-row .v { color: white; font-weight: 700; }
  .score-explain .trust-row .v.up { color: #4ade80; }
  .score-explain .trust-row .v.flat { color: rgba(255,255,255,0.6); }

  /* 섹터 비교 박스 */
  .score-explain .sector-compare {
    background: rgba(244,200,105,0.05);
    border: 1px solid rgba(244,200,105,0.2);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .score-explain .sec-row {
    display: flex; justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .score-explain .sec-row:last-child { border-bottom: none; }
  .score-explain .sec-row .l { color: rgba(255,255,255,0.7); }
  .score-explain .sec-row .v { color: white; font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-explain .sec-row .v.up { color: #4ade80; }
  .score-explain .sec-row .v.dn { color: #ef4444; }

  /* 어떻게 만들어졌나 stack */
  .score-explain .method-stack {
    display: flex; flex-direction: column; gap: 8px;
  }
  .score-explain .method-step {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .score-explain .method-step .num {
    background: #ff4836; color: white;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .score-explain .method-step .desc {
    font-size: 13px; color: rgba(255,255,255,0.9);
    line-height: 1.45;
  }
  .score-explain .method-step .desc b { color: #f4c869; font-weight: 700; }

  /* 정직한 한계 박스 */
  .score-explain .limits-box {
    background: rgba(255,72,54,0.06);
    border-left: 3px solid rgba(255,72,54,0.5);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    font-size: 12.5px;
    color: rgba(255,255,255,0.75);
    line-height: 1.55;
  }
  .score-explain .limits-box b { color: #ff8b7a; font-weight: 700; }

  /* ─── 뉴스 모달 ─── */
  .news-list .news-row {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
  }
  .news-list .news-row:active { background: rgba(255,255,255,0.03); }
  .news-list .news-row .meta-row {
    display: flex; justify-content: space-between;
    font-size: 10px; margin-bottom: 4px;
  }
  .news-list .news-row .src { color: #f4c869; font-weight: 600; }
  .news-list .news-row .time { color: rgba(255,255,255,0.4); }
  .news-list .news-row .ttl {
    font-size: 13px; color: white; line-height: 1.4;
    margin-bottom: 5px;
  }
  .news-list .news-row .chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .news-list .news-row .chip {

  <div class="sheet-head">
    <h3 id="newsHeadName">종목명</h3>
    <div class="sub" id="newsHeadSub">관련 뉴스</div>
  </div>
  <div class="sheet-body news-list" id="newsBody">
