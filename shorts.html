<div class="sheet" id="newsSheet" aria-hidden="true">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h3 id="newsHeadName">종목명</h3>
    <div class="sub" id="newsHeadSub">관련 뉴스</div>
  </div>
  <div class="sheet-body news-list" id="newsBody">
    <div class="news-load">로딩중...</div>
  </div>
</div>

<script>
(async function() {
  const API_BASE = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
    ? 'http://127.0.0.1:8765' : location.origin;

  // ═══════════════════════════════════════════════
  //  Supabase 백엔드 — 설정되어 있으면 클라우드, 아니면 localStorage
  // ═══════════════════════════════════════════════
  const SB_URL = window.SQ_SUPABASE_URL || localStorage.getItem('SQ_SUPABASE_URL') || '';
  const SB_KEY = window.SQ_SUPABASE_KEY || localStorage.getItem('SQ_SUPABASE_KEY') || '';
  let sb = null;
  if (SB_URL && SB_KEY && window.supabase) {
    try {
      sb = window.supabase.createClient(SB_URL, SB_KEY, {
        auth: { persistSession: true, autoRefreshToken: true },
      });
      console.log('[Supabase] cloud mode connected');
    } catch (e) {
      console.warn('[Supabase] init failed, using localStorage', e);
    }
  } else {
    console.log('[Supabase] not configured — using localStorage fallback');
  }

  // ═══════════════════════════════════════════════
  //  Firebase Auth (Google 로그인) — config 채우면 자동 활성화
  //  console.firebase.google.com → 프로젝트 → 웹 앱 등록 → 아래에 붙여넣기
  //  Authentication > Sign-in method 에서 Google 활성화 +
  //  Settings > Authorized domains 에 배포 도메인 추가 필요
  // ═══════════════════════════════════════════════
  const FIREBASE_CONFIG = window.SQ_FIREBASE_CONFIG
    || JSON.parse(localStorage.getItem('SQ_FIREBASE_CONFIG') || 'null')
    || null;   // ← { apiKey:'...', authDomain:'xxx.firebaseapp.com', projectId:'xxx', appId:'...' }

  // ═══════════════════════════════════════════════
  //  Google AdSense — client/slot 채우면 쇼츠 every 개마다 광고 카드 삽입
  //  adsense.google.com 승인 후: client='ca-pub-XXXXXXXXXXXXXXXX', slot=인피드 광고 단위 ID
  // ═══════════════════════════════════════════════
  const ADSENSE = window.SQ_ADSENSE || { client: '', slot: '', every: 8 };

  const loadScript = (src) => new Promise((res, rej) => {
    const el = document.createElement('script');
    el.src = src; el.async = true;
    el.onload = res; el.onerror = () => rej(new Error('script load fail: ' + src));
    document.head.appendChild(el);
  });

  let fbAuth = null;
  if (FIREBASE_CONFIG) {
    try {
      await loadScript('https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js');
      firebase.initializeApp(FIREBASE_CONFIG);
      fbAuth = firebase.auth();
      console.log('[Firebase] auth ready');
    } catch (e) {
      console.warn('[Firebase] init failed — local 모드로 진행', e);
    }
  }

  if (ADSENSE.client) {
    loadScript(`https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${encodeURIComponent(ADSENSE.client)}`)
      .catch(() => console.warn('[AdSense] script load 실패 (차단기?)'));
  }

  // 백엔드 추상 — 모든 댓글·인증 호출은 이 객체 통과
  const Backend = {
    cloud: !!fbAuth || !!sb,
    async signInGoogle() {
      if (fbAuth) {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        try {
          await fbAuth.signInWithPopup(provider);
        } catch (e) {
          // 모바일 인앱브라우저 등 popup 차단 환경 → redirect fallback
          if (e && (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user'
                    || e.code === 'auth/operation-not-supported-in-this-environment')) {
            await fbAuth.signInWithRedirect(provider);
            return;
          }
          throw e;
        }
        return;
      }
      if (!sb) throw new Error('Firebase/Supabase 미설정 — 설정 후 사용 가능');
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: location.href.split('#')[0].split('?')[0],
          queryParams: { prompt: 'select_account' },
        },
      });
      if (error) throw error;
      // redirect가 발생하므로 이 다음은 페이지 로드 후 onAuthStateChange에서 처리
    },
    async signInLocal(name) {
      // Supabase 미설정 시 prototype 모드 — 로컬 닉네임만
      const uid = 'local_' + Math.random().toString(36).slice(2, 11);
      return { uid, name };
    },
    async signOut() {
      if (fbAuth) { try { await fbAuth.signOut(); } catch (_) {} }
      if (sb) await sb.auth.signOut();
    },
    async getSession() {
      if (fbAuth) {
        // 초기화 직후 currentUser 가 아직 null 일 수 있음 — 첫 auth state 대기
        const u = await new Promise(res => {
          const un = fbAuth.onAuthStateChanged(x => { un(); res(x); }, () => { un(); res(null); });
        });
        if (u) {
          return {
            uid: u.uid,
            name: u.displayName || (u.email ? u.email.split('@')[0] : '익명'),
            picture: u.photoURL || null,
            email: u.email || null,
            provider: 'google',
          };
        }
        return null;
      }
      if (sb) {
        const { data } = await sb.auth.getSession();
        const u = data.session?.user;
        if (u) {
          const m = u.user_metadata || {};
          return {
            uid: u.id,
            name: m.full_name || m.name || (u.email ? u.email.split('@')[0] : '익명'),
            picture: m.picture || m.avatar_url || null,
            email: u.email || null,
            provider: u.app_metadata?.provider || 'google',
          };
        }
      }
      return null;
    },
    async listComments(scope) {
      if (sb) {
        const { data, error } = await sb
          .from('comments')
          .select('id, user_name, text, ts')
          .eq('scope', scope)
          .order('ts', { ascending: true })
          .limit(200);
        if (error) { console.warn('list err', error); return []; }
        return (data || []).map(c => ({ user: c.user_name, text: c.text, ts: new Date(c.ts).getTime(), id: c.id }));
      }
      return JSON.parse(localStorage.getItem('sq_comm_' + scope) || '[]');
    },
    async addComment(scope, text) {
      const user = getUser();
      if (!user) throw new Error('login required');
      // 입력 검증 (서버 RLS와 별개로 클라이언트도)
      if (!text || typeof text !== 'string') throw new Error('empty');
      const trimmed = text.trim().slice(0, 200);
      if (!trimmed) throw new Error('empty');
      // rate limit — 마지막 댓글 후 3초
      const lastTs = parseInt(localStorage.getItem('sq_last_comm_ts') || '0');
      if (Date.now() - lastTs < 3000) throw new Error('too fast — 3초 후 다시');
      localStorage.setItem('sq_last_comm_ts', String(Date.now()));
      if (sb) {
        const session = await sb.auth.getSession();
        if (!session.data.session) throw new Error('not authenticated');
        const { error } = await sb.from('comments').insert({
          scope, user_name: user.name, text: trimmed,
        });
        if (error) throw error;
        return true;
      }
      // local fallback
      const list = JSON.parse(localStorage.getItem('sq_comm_' + scope) || '[]');
      list.push({ user: user.name, text: trimmed, ts: Date.now() });
      localStorage.setItem('sq_comm_' + scope, JSON.stringify(list));
      return true;
    },
  };
  window.SQ_Backend = Backend;  // 디버그용

  // ─── OAuth redirect 복귀 시 session 자동 동기화 ───
  async function syncUserFromSession() {
    const sess = await Backend.getSession();
    if (sess) {
      const prev = JSON.parse(localStorage.getItem('sq_user') || 'null');
      localStorage.setItem('sq_user', JSON.stringify({
        uid: sess.uid,
        name: sess.name,
        picture: sess.picture,
        email: sess.email,
        provider: sess.provider,
        joined: prev?.joined || Date.now(),
      }));
      return true;
    }
    return false;
  }
  await syncUserFromSession();

  let activeTab = 'hot';   // auth 리스너가 즉시 발화할 수 있어 여기서 선언
  let _digestData = null;  // 저장 종목 다이제스트 — checkSavedDigest()가 선언보다 먼저 호출되어 위로 끌어올림
  if (fbAuth) {
    fbAuth.onAuthStateChanged(async (u) => {
      console.log('[Auth:firebase]', u ? 'signed-in' : 'signed-out');
      if (u) await syncUserFromSession();
      else localStorage.removeItem('sq_user');
      if (typeof renderMe === 'function' && activeTab === 'me') renderMe();
    });
  }
  if (sb) {
    sb.auth.onAuthStateChange(async (event, session) => {
      console.log('[Auth]', event);
      if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'INITIAL_SESSION') {
        await syncUserFromSession();
        // me 탭이 열려 있으면 재렌더
        if (typeof renderMe === 'function' && activeTab === 'me') renderMe();
      } else if (event === 'SIGNED_OUT') {
        localStorage.removeItem('sq_user');
        if (typeof renderMe === 'function' && activeTab === 'me') renderMe();
      }
    });
  }
  const reelsEl = document.getElementById('reels');
  const loadingEl = document.getElementById('loading');
  const progressEl = document.getElementById('progress');
  const counterEl = document.getElementById('counter');
  const regimeChip = document.getElementById('regimeChip');

  // ─── API ───
  const CURRENT_MARKET = 'kr';   // KR 전용 — US 토글 제거 (2026-06)
  async function fetchSweep() {
    try {
      const r = await fetch(`${API_BASE}/api/sweep?market=${CURRENT_MARKET}&top_n=200`);
      return await r.json();
    } catch (e) {
      return { error: e.message };
    }
  }

  // ─── WHY 한 줄 자동 생성 (뉴스 점수 + KOSPI 대비) ───
  function buildWhy(s) {
    const a = computeAlpha(s);
    const aval = a.alpha5;
    const r = s.news_rating !== undefined ? s.news_rating : computeNewsRating(s);
    const n = s.news_count;
    const sub = s.sub_count;
    const mys = s.is_mystery;
    const upDn = r > 0 ? 'up' : (r < 0 ? 'dn' : '');
    const rSign = r > 0 ? '+' : '';
    const aSign = aval > 0 ? '+' : '';
    if (mys || (Math.abs(aval) >= 3 && n === 0)) {
      return { label: '원인 미상', text: `<b>뉴스 없이</b> 코스피보다 ${aSign}${aval.toFixed(1)}% 움직였어요`, cls: 'mystery' };
    }
    const bull = s.news_bull || 0;
    const bear = s.news_bear || 0;
    if (sub >= 5 && r >= 35) {
      return { label: '왜 움직였나', text: `좋은 사건 뉴스 <b>${sub}건</b> (호재 ${bull} · 악재 ${bear})`, cls: upDn };
    }
    if (sub >= 5 && r <= -35) {
      return { label: '왜 움직였나', text: `나쁜 사건 뉴스 <b>${sub}건</b> (호재 ${bull} · 악재 ${bear})`, cls: 'dn' };
    }
    if (n >= 3 && r >= 15) {
      return { label: '왜 움직였나', text: `좋은 뉴스 우세 — 호재 <b>${bull}</b> vs 악재 ${bear} (전체 ${n}건)`, cls: upDn };
    }
    if (n >= 3 && r <= -15) {
      return { label: '왜 움직였나', text: `나쁜 뉴스 우세 — 악재 <b>${bear}</b> vs 호재 ${bull} (전체 ${n}건)`, cls: 'dn' };
    }
    if (n === 0) {
      return { label: '뉴스 없음', text: `코스피 대비 ${aSign}<b>${aval.toFixed(1)}%</b> 움직였지만 관련 뉴스는 없음`, cls: upDn };
    }
    return { label: '왜 움직였나', text: `뉴스 ${n}건 · 호재 ${bull} vs 악재 ${bear} (방향 약함)`, cls: upDn };
  }

  // ─── 신뢰 배지 (쉬운 한국어) ───
  function buildTrust(s) {
    if (s.is_mystery) return { txt: '? 원인 미상 — 신뢰도 측정 어려움', cls: 'mystery' };
    if (s.news_count >= 5 && s.sub_count >= 3 && s.src_avg >= 0.7) {
      return { txt: '✓ 신뢰도 높음 · 여러 언론사 동시 보도', cls: 'high' };
    }
    if (s.news_count >= 3) {
      return { txt: '주목할 만한 신호 · 보도량 충분', cls: 'mid' };
    }
    return { txt: '참고용 — 뉴스 적음', cls: 'low' };
  }

  // ─── 카드 색 — 뉴스 점수(보정 polarity) 기반 ───
  function reelBg(r) {
    if (r >= 40) return 'upS';
    if (r > 5) return 'up';
    if (r <= -40) return 'dnS';
    if (r < -5) return 'dn';
    return 'flat';
  }

  // ─── 섹터 한국어 라벨 ───
  const SECTOR_KR = {
    tech: '반도체·테크', battery: '2차전지', chemicals: '화학',
    auto: '자동차', defense: '방산·조선', utility: '전력·에너지',
    materials: '소재', financials: '금융', healthcare: '바이오·헬스',
    consumer: '소비재·엔터', transport: '운송', real_estate: '리츠·부동산',
    energy: '에너지', industrials: '산업재', telecom: '통신',
    index: 'ETF·인덱스',
  };

  // ─── 뉴스 점수 (Bayesian shrinkage + 실질 비중 가중) ───
  // 문제: 단순 (bull-bear)/(bull+bear)*100 이면 1-0 호재 → +100 (통계 부정확)
  // 해결: shrinkage prior 추가 — 작은 샘플은 0에 가깝게 끌어옴
  //       실질 뉴스 비중이 클수록 신호 신뢰도 ↑ (가중치 0.5~1)
  function computeNewsRating(s) {
    if (!s) return 0;
    const bull = s.news_bull || 0;
    const bear = s.news_bear || 0;
    const n = s.news_count || 0;
    const sub = s.sub_count || 0;
    const SHRINK = 5;    // prior strength — 5건 정도 평균 분위기 가정
    const SUB_BASE = 2;  // 실질 비중 baseline
    if (n === 0) return 0;
    const rawPol = ((bull - bear) / (bull + bear + SHRINK)) * 100;
    const subWeight = Math.min(1, sub / (n + SUB_BASE));
    // 실질 비중이 0이면 0.5x, 1이면 1.0x — 부풀려진 호재/악재 자동 디스카운트
    return rawPol * (0.5 + 0.5 * subWeight);
  }

  // ─── 뉴스 quality 점수 (모멘텀 제거 — 가격 예측 X) ───
  // 2026-06 회귀 정렬: density 는 forward alpha 에 음의 계수 (뉴스 폭풍 후
  // mean reversion) → 가중 0.25→0.10 축소. shrinkage rating·실질 비율 ↑.
  function computeNewsScore(s) {
    if (!s) return 0;
    const rating = computeNewsRating(s) / 10;                               // -10 ~ +10
    const density = Math.min(3.0, (s.news_count || 0) * 0.15);
    const subRatio = s.news_count > 0 ? (s.sub_count / s.news_count) : 0;
    const srcAvg = s.src_avg || 0.5;
    const spec = s.specificity || 0;
    const pen = s.priced_in_penalty || 0;
    return (
      0.50 * rating
      + 0.10 * density
      + 0.20 * (subRatio * 10)
      + 0.10 * (srcAvg * 10)
      + 0.10 * spec
      + pen
    );
  }
  // 점수 분해 (모달용)
  function scoreBreakdown(s) {
    const rating = computeNewsRating(s) / 10;
    const density = Math.min(3.0, (s.news_count || 0) * 0.15);
    const subRatio = s.news_count > 0 ? (s.sub_count / s.news_count) : 0;
    const srcAvg = s.src_avg || 0.5;
    const spec = s.specificity || 0;
    const pen = s.priced_in_penalty || 0;
    return {
      rating: 0.50 * rating,
      density: 0.10 * density,
      substance: 0.20 * (subRatio * 10),
      source: 0.10 * (srcAvg * 10),
      specificity: 0.10 * spec,
      penalty: pen,
      total: computeNewsScore(s),
      subRatio,
      newsRating: computeNewsRating(s),  // -100~+100 라벨링용
    };
  }
  function sectorLabel(s) {
    if (!s) return null;
    return SECTOR_KR[s] || s;
  }

  // ─── 섹터 fallback — 종목명 키워드 (정교화) ───
  // ETF / 인덱스 / 머니마켓은 별도
  const SECTOR_KEYWORDS = [
    // ETF·인덱스·머니마켓 우선 매칭 (다른 키워드 오매칭 방지)
    [['머니마켓','MONEY','CD1년','KOFR','금리액티브','채권액티브','초단기'], 'financials'],
    [['미국나스닥','미국배당','미국S&P','미국주식','글로벌AI','미국채','TOP10'], 'index'],
    // 헬스케어 — 바이오·제약·진단·의료기기
    [['바이오','제약','의약','신약','진단','셀','메디','헬스','병원','BIO','PHARM',
      '오스템','임플란트','치과','파마','펩트','파마리서치','SK바이오','셀트리온',
      '삼성바이오','한미','녹십자','종근당','보령','동아ST','대웅','유한','일동',
      '디앤디파마','올릭스','펩트론','루닛','에이비엘','뷰노','지놈앤'], 'healthcare'],
    // 배터리·2차전지
    [['배터리','전지','양극재','음극재','전해질','분리막','리튬','에너지솔루션','SDI','퓨처엠',
      '에코프로','엘앤에프','포스코퓨처엠','에너지머티리얼즈','솔루스첨단','이수','동화','신흥'], 'battery'],
    // 반도체·디스플레이·IT (가장 광범위, 후순위 매칭)
    [['반도체','메모리','디스플레이','OLED','LCD','파운드리','테크','전자','전기','광학','시스템',
      '솔루션','IT','소프트','네트워크','통신장비','부품','SK하이닉스','삼성전자','LG디스플',
      'LG이노텍','테크놀','파두','테스나','ISC','두산테스','서진시스템','로보티즈','로보틱스',
      '비전','센서','광반','EUV','HBM','파워반','네패스','피에스케이','동진','하나마이크론',
      '심텍','대덕전자','이오테크','원익','솔브레인','SK스퀘어','뉴인텍','더존','펄어비스만은aside',
      '카카오','네이버','NAVER','KAKAO'], 'tech'],
    // 자동차·모빌리티
    [['자동차','모비스','타이어','부품','HMC','현대차','기아','자동차부품','전장','EV',
      '한국타이어','넥센','금호타이어','만도','현대위아','에스엘','평화'], 'auto'],
    // 방산·조선·항공우주
    [['방산','항공우주','우주','드론','중공업','조선','한화에어로','LIG넥스원','HD현대',
      '삼성중공업','한국항공','한화오션','대우조선','두산밥캣','한진중공업','현대로템'], 'defense'],
    // 화학·정유·소재
    [['케미컬','정유','석유','SK이노','GS칼텍스','LG화학','롯데케미칼','OCI','한화솔루션',
      '효성','SKC','한솔','코오롱'], 'chemicals'],
    [['건설','시멘트','철강','포스코','현대제철','동국','쌍용','삼표','대우건설','GS건설',
      'DL이앤씨','HDC','대림','동아','쌍용씨앤이','강원철강'], 'industrials'],
    [['전력','한전','한국전력','SMR','수소','풍력','태양광','원자력','발전','두산에너빌리티',
      '효성중공업','LS ELECTRIC','HD현대일렉트릭','가스공사','도시가스','삼천리','대성',
      '한국가스','지역난방','휴켐스'], 'utility'],
    // 통신
    [['통신','SKT','KT','LGU','스카이라이프','LG유플러스','SK텔레콤'], 'telecom'],
    // 금융·은행·증권·보험·지주
    [['은행','금융','증권','보험','카드','자산운용','캐피탈','지주','KB','신한','하나','우리',
      '삼성생명','한국금융','삼성카드','삼성증권','현대해상','DB손해','한화생명','미래에셋',
      '키움','대신','교보','신영','메리츠','한국투자','BNK','DGB','JB금융','기업은행',
      'NH투자','SK디스커버리'], 'financials'],
    // 소비재·엔터·게임·유통
    [['게임','엔터','미디어','콘텐츠','웹툰','크래프톤','엔씨','넥슨','카카오게임','펄어비스',
      'SM','JYP','YG','하이브','데브시스터즈','컴투스','넷마블','웹젠','네오위즈',
      '백화점','이마트','롯데쇼핑','신세계','GS리테일','BGF','편의점','마트',
      '식품','농심','오리온','롯데웰푸드','CJ제일제당','삼양','대상','오뚜기','동원',
      '아모레','LG생활건강','한국콜마','코스맥스','한국화장품','클리오',
      '의류','패션','코오롱인더','한세실업','신성통상','LF','휠라'], 'consumer'],
    // 운송·물류·여행
    [['항공','해운','물류','운송','대한항공','HMM','팬오션','CJ대한통운','한진','아시아나',
      '에어부산','진에어','롯데글로벌','쿠팡'], 'transport'],
    // 부동산·리츠
    [['리츠','부동산','REIT','맥쿼리','신한알파리츠'], 'real_estate'],
    // 보안·렌탈·서비스
    [['보안','경비','에스원','ADT','SK네트웍스','코웨이','쿠쿠'], 'consumer'],
    // 우선주는 본주와 같은 섹터로 추론 (이름에 '우' 또는 '우B' 끝)
  ];
  function inferSector(name) {
    if (!name) return null;
    // 우선주: 본주에 매칭되는 키워드로 처리됨 (예: '두산우' → '두산' 매칭)
    for (const [kws, sec] of SECTOR_KEYWORDS) {
      for (const kw of kws) {
        if (name.includes(kw)) return sec;
      }
    }
    return null;
  }
  function getSector(s) {
    return s.sector || inferSector(s.name);
  }

  // ─── Candle chart (실 OHLC, lazy load) ───
  const chartCache = new Map();
  async function loadChart(code) {
    if (chartCache.has(code)) return chartCache.get(code);
    const p = fetch(`${API_BASE}/api/stock-chart?code=${code}&range=1mo&market=${CURRENT_MARKET}`)
      .then(r => r.json()).then(d => d.bars || []).catch(() => []);
    chartCache.set(code, p);
    return p;
  }

  // ─── KOSPI 지수 (alpha 계산용) ───
  let kospiBars = null;
  async function loadKospi() {
    if (kospiBars !== null) return kospiBars;
    try {
      const benchCode = CURRENT_MARKET === 'us' ? '^GSPC' : '^KS11';
      const r = await fetch(`${API_BASE}/api/stock-chart?code=${benchCode}&range=1mo&market=${CURRENT_MARKET}`);
      const j = await r.json();
      kospiBars = j.bars || [];
    } catch (e) { kospiBars = []; }
    return kospiBars;
  }
  function kospiMomNDays(n) {
    if (!kospiBars || kospiBars.length < n + 1) return 0;
    const last = kospiBars[kospiBars.length - 1].c;
    const prev = kospiBars[kospiBars.length - 1 - n].c;
    if (!last || !prev) return 0;
    return (last - prev) / prev * 100;
  }
  // 종목의 시장 대비 alpha (KOSPI 대비)
  function computeAlpha(s) {
    return {
      alpha5: (s.mom_5 || 0) - kospiMomNDays(5),
      alpha20: (s.mom_20 || 0) - kospiMomNDays(20),
      kospi5: kospiMomNDays(5),
      kospi20: kospiMomNDays(20),
    };
  }
  function renderCandles(bars) {
    if (!bars || bars.length === 0) return '<div class="ck-loading">차트 데이터 없음</div>';
    // 마지막 20개만, OHLC normalize
    const slice = bars.slice(-20);
    const valid = slice.filter(b => b.o != null && b.h != null && b.l != null && b.c != null);
    if (valid.length === 0) return '<div class="ck-loading">OHLC 데이터 없음</div>';
    const allHi = Math.max(...valid.map(b => b.h));
    const allLo = Math.min(...valid.map(b => b.l));
    const range = allHi - allLo || 1;
    const out = valid.map(b => {
      const up = b.c >= b.o;
      const cls = up ? 'up' : (b.c < b.o ? 'dn' : 'flat');
      // pct 0~100 (top = high, bottom = low)
      const yHi = ((allHi - b.h) / range) * 100;
      const yLo = ((allHi - b.l) / range) * 100;
      const yOC1 = ((allHi - Math.max(b.o, b.c)) / range) * 100;
      const yOC2 = ((allHi - Math.min(b.o, b.c)) / range) * 100;
      const wickH = yLo - yHi;
      const bodyH = Math.max(1.5, yOC2 - yOC1);
      return `<div class="ck ${cls}">
        <div class="wick" style="top:${yHi}%; height:${wickH}%"></div>
        <div class="body" style="top:${yOC1}%; height:${bodyH}%"></div>
      </div>`;
    }).join('');
    const last = valid[valid.length - 1];
    const meta = `1M · ${valid.length}봉 · 마감 ${last.c.toLocaleString()}`;
    return out + `<div class="ck-meta">${meta}</div>`;
  }

  // ─── 신뢰도 계산 (보류·낮음·보통·높음) ───
  // 표본 크기 + 매체 신뢰도 + 실질 비율 기반
  function computeConfidence(s) {
    const sub = s.sub_count || 0;
    const n = s.news_count || 0;
    const src = s.src_avg || 0.5;
    if (n < 3 || sub === 0) return { level: 'hold', label: '보류', short: '데이터 부족', pct: 15 };
    if (sub < 2) return { level: 'low', label: '낮음', short: '실질 뉴스 부족', pct: 35 };
    if (sub < 5 || src < 0.45) return { level: 'normal', label: '보통', short: `실질 ${sub}건`, pct: 60 };
    if (sub >= 8 && src >= 0.55) return { level: 'high', label: '높음', short: `실질 ${sub}건 · 신뢰 매체`, pct: 92 };
    return { level: 'high', label: '높음', short: `실질 ${sub}건`, pct: 80 };
  }
  // ─── 종합 점수 자연어 라벨 ───
  function newsRatingNarrative(nr, sub) {
    if (sub === 0) return { txt: '뉴스 없음', cls: 'flat' };
    if (nr >= 50) return { txt: '강한 호재 신호', cls: 'pos' };
    if (nr >= 20) return { txt: '호재 우세', cls: 'pos' };
    if (nr >= 5) return { txt: '약한 호재', cls: 'pos' };
    if (nr <= -50) return { txt: '강한 악재 신호', cls: 'neg' };
    if (nr <= -20) return { txt: '악재 우세', cls: 'neg' };
    if (nr <= -5) return { txt: '약한 악재', cls: 'neg' };
    return { txt: '중립 (방향 모호)', cls: 'flat' };
  }
  // ─── 백분위 (상위/하위 N%) ───
  function rankPercentile(s) {
    if (!allResults || allResults.length < 5) return null;
    const sorted = [...allResults].sort((a, b) => (b.news_score || 0) - (a.news_score || 0));
    const rank = sorted.findIndex(x => x.code === s.code) + 1;
    if (rank === 0) return null;
    const pct = Math.round(rank / sorted.length * 100);
    return { rank, total: sorted.length, pct };
  }

  // ─── 카드 큐레이션 — 실제 사건 헤드라인 (최대 2건, 미반영 우선) ───
  function renderTopNews(s, why) {
    const top = (s.top_news || []).slice(0, 2);
    if (s.is_mystery || (s.news_count || 0) === 0) {
      return `<div class="sh-empty">${why.text}</div>`;
    }
    if (!top.length) {
      if ((s.sub_count || 0) > 0) return '';   // 구버전 sweep 캐시 fallback — 집계만 표시
      return `<div class="sh-empty">최근 ${s.news_count}건 모두 시황 중계·추측성 기사 — 실제 사건 없음</div>`;
    }
    return '<div class="sh-news">' + top.map((t, i) => `
      <div class="shn-item">
        <span class="shn-chip ${t.sentiment === 'bull' ? 'bull' : 'bear'}">${t.sentiment === 'bull' ? '호재' : '악재'}</span>
        <div class="shn-body">
          <div class="shn-title">${t.title || ''}</div>
          ${i === 0 && t.comment ? `<div class="shn-cmt">💬 ${t.comment}</div>` : ''}
          <div class="shn-meta">${t.paper || ''} · ${timeAgo(t.ts)}${t.scope === 'sector' ? ' · 업종 전반' : ''}${t.priced_in ? ' · <span class="shn-pi">이미 반영</span>' : ''}</div>
        </div>
      </div>`).join('') + '</div>';
  }

  // ─── 카드 렌더 ───
  function renderReel(s, idx, total) {
    const a = computeAlpha(s);
    const alpha = a.alpha5;
    const sign = alpha > 0 ? '+' : '';
    const kSign = a.kospi5 > 0 ? '+' : '';
    const mSign = s.mom_5 > 0 ? '+' : '';
    const why = buildWhy(s);
    const trust = buildTrust(s);
    const newsRating = s.news_rating !== undefined ? s.news_rating : computeNewsRating(s);
    const bgCls = s.is_mystery ? 'mystery' : reelBg(newsRating);
    const chgCls = alpha > 0 ? 'up' : (alpha < 0 ? 'dn' : 'flat');
    const sectorId = s.sector_resolved || getSector(s);
    const secKR = sectorLabel(sectorId);
    // 섹터 평가 정보 라인 — 종목 평균 + LLM scope='sector' 자체 신호 둘 다
    let sectorInfoHtml = '';
    const st = sectorId ? sectorStats[sectorId] : null;
    if (st && (st.n >= 2 || st.sectorBull !== undefined)) {
      const rSign = st.avgRating >= 0 ? '+' : '';
      const aSign = st.avgAlpha >= 0 ? '+' : '';
      const rCls = st.avgRating >= 15 ? 'sec-pol-pos' : st.avgRating <= -15 ? 'sec-pol-neg' : 'sec-pol-flat';
      const aCls2 = st.avgAlpha >= 2 ? 'sec-pol-pos' : st.avgAlpha <= -2 ? 'sec-pol-neg' : 'sec-pol-flat';
      // 섹터 자체 호악재 (LLM scope=sector) — 있으면 표시
      let secOwnHtml = '';
      if (st.sectorBull !== undefined && (st.sectorBull + st.sectorBear) > 0) {
        const sr = st.sectorRating || 0;
        const srSign = sr >= 0 ? '+' : '';
        const srCls = sr >= 15 ? 'sec-pol-pos' : sr <= -15 ? 'sec-pol-neg' : 'sec-pol-flat';
        secOwnHtml = `<span>· 업종뉴스 <span class="${srCls}">${srSign}${sr.toFixed(0)}</span> <span style="opacity:0.6">(호${st.sectorBull}/악${st.sectorBear})</span></span>`;
      }
      sectorInfoHtml = `
        <div class="sector-info-line" data-sector="${sectorId}" role="button">
          <span class="sec-name">📁 ${secKR}</span>
          <span>뉴스 분위기 <span class="${rCls}">${rSign}${st.avgRating.toFixed(0)}</span></span>
          ${secOwnHtml}
          <span>· 코스피보다 <span class="${aCls2}">${aSign}${st.avgAlpha.toFixed(1)}%</span></span>
          <span class="sec-go">자세히 ›</span>
        </div>
      `;
    }

    const heroLabel = alpha > 1 ? '5일간 코스피보다 강함' :
                       alpha < -1 ? '5일간 코스피보다 약함' :
                       '5일간 코스피와 비슷';
    // 섹터 대비 alpha — (종목 alpha) - (섹터 평균 alpha)
    const sectorAvgAlpha = (sectorId && sectorStats[sectorId] && sectorStats[sectorId].n >= 2)
                            ? sectorStats[sectorId].avgAlpha : null;
    const sectorAlpha = sectorAvgAlpha !== null ? (alpha - sectorAvgAlpha) : null;
    const kospiCls = alpha > 0 ? 'up' : (alpha < 0 ? 'dn' : 'flat');
    const sectorCls = sectorAlpha !== null
                        ? (sectorAlpha > 0 ? 'up' : (sectorAlpha < 0 ? 'dn' : 'flat'))
                        : 'flat';
    const sectorSign = sectorAlpha !== null && sectorAlpha > 0 ? '+' : '';
    const conf = computeConfidence(s);
    const narr = newsRatingNarrative(newsRating, s.sub_count || 0);
    const secAvg5 = (st && st.n >= 2) ? st.avgMom5 : null;
    return `
      <div class="reel ${bgCls}" data-idx="${idx}" data-code="${s.code}">
        <button class="save-chip item ${(JSON.parse(localStorage.getItem('sq_saved')||'[]')).includes(s.code) ? 'on' : ''}" data-action="save" aria-label="저장">⭐</button>
        <div class="ticker-row">${s.code} · ${s.market || 'KOSPI'}${secKR ? ' · ' + secKR : ''}</div>
        <h3>${s.name}</h3>

        <!-- ① 뉴스 큐레이션 — 실제 사건 헤드라인이 콘텐츠 (탭하면 뉴스 전체) -->
        <div class="score-hero score-hero-${narr.cls} ${conf.level === 'hold' ? 'is-hold' : ''}" data-action="news">
          <div class="sh-top">
            <div class="sh-label">실제 사건 뉴스</div>
            ${(s.news_count || 0) - (s.sub_count || 0) > 0
              ? `<div class="sh-filtered">잡음 ${(s.news_count || 0) - (s.sub_count || 0)}건 걸러냄</div>` : ''}
          </div>
          ${renderTopNews(s, why)}
          <div class="sh-agg">
            <span class="c-bull">호재 ${s.news_bull || 0}</span><span class="agg-sep">·</span><span class="c-bear">악재 ${s.news_bear || 0}</span><span class="agg-sep">·</span><span class="agg-dim">실질 ${s.sub_count || 0}/${s.news_count || 0}건</span>
          </div>
          ${newsRating >= 35 && alpha <= -2 && conf.level !== 'hold' ? `
          <div class="sh-overheat">⚠ 뉴스 과열 의심 — 좋은 뉴스가 많은데 가격은 약세. 포장된 호재이거나 이미 반영됐을 수 있어요</div>
          ` : ''}
          <div class="sh-confidence">
            <div class="sc-row">
              <span class="sc-l">신뢰도</span>
              <span class="sc-r sc-${conf.level}">${conf.label}</span>
            </div>
            <div class="sc-bar"><div class="sc-fill sc-fill-${conf.level}" style="width:${conf.pct}%"></div></div>
            <div class="sc-meta">${conf.short}</div>
          </div>
        </div>

        <!-- ② 수익률 — 5일 절대 + 코스피/섹터 대비 (핵심만) -->
        <div class="ret-box">
          <div class="ret-row">
            <div class="ret-cell">
              <div class="rc-lbl">이 종목 5일</div>
              <div class="rc-val ${s.mom_5>0?'up':s.mom_5<0?'dn':''}">${s.mom_5>0?'+':''}${s.mom_5.toFixed(1)}%</div>
            </div>
            <div class="ret-cell">
              <div class="rc-lbl">코스피 5일</div>
              <div class="rc-val ${a.kospi5>0?'up':a.kospi5<0?'dn':''}">${a.kospi5>0?'+':''}${a.kospi5.toFixed(1)}%</div>
            </div>
            <div class="ret-cell">
              <div class="rc-lbl">섹터 5일</div>
              <div class="rc-val ${secAvg5 !== null ? (secAvg5>0?'up':secAvg5<0?'dn':'') : ''}">${secAvg5 !== null ? (secAvg5>0?'+':'') + secAvg5.toFixed(1) + '%' : '—'}</div>
            </div>
          </div>
          <div class="ret-divider"></div>
          <div class="ret-row">
            <div class="ret-cell hl">
              <div class="rc-lbl">코스피 대비</div>
              <div class="rc-val ${kospiCls}">${sign}${alpha.toFixed(1)}%p</div>
            </div>
            <div class="ret-cell hl">
              <div class="rc-lbl">섹터 대비</div>
              <div class="rc-val ${sectorCls}">${sectorAlpha !== null ? sectorSign + sectorAlpha.toFixed(1) + '%p' : '—'}</div>
            </div>
          </div>
        </div>

        ${sectorInfoHtml}

        <!-- ④ CTA 버튼 (강조) -->
        <div class="cta-row">
          <button class="cta-btn cta-news" data-action="news">📰 뉴스 ${s.sub_count}건 <span class="arr">›</span></button>
          <button class="cta-btn cta-score" data-explain="${idx}">📊 평가 근거 <span class="arr">›</span></button>
        </div>

        ${idx === 0 ? '<div class="swipe-hint"><span class="arrow">︽</span><span>위로 스와이프</span></div>' : ''}
      </div>
    `;
  }

  // ─── 메인 로딩 ───
  const data = await fetchSweep();
  await loadKospi();      // alpha 계산용
  loadingEl.classList.add('hide');
  if (data.error) {
    document.body.innerHTML += `<div class="err-msg">API 오류: ${data.error}</div>`;
    return;
  }

  // 모든 종목에 frontend news_score + news_rating 재계산 + sector fallback
  const allResults = (data.all || []).map(r => ({
    ...r,
    news_score: computeNewsScore(r),
    news_rating: computeNewsRating(r),
    sector_resolved: r.sector || inferSector(r.name),
  }));
  // news_score 기준 재정렬: top 18 (호재) + bottom 12 (악재) + mystery 5
  const sortedByNews = [...allResults].sort((a, b) => b.news_score - a.news_score);
  const top = sortedByNews.slice(0, 18);
  const bot = sortedByNews.slice(-12).reverse();
  const mystery = (data.mystery_movers || []).map(r => ({
    ...r, news_score: computeNewsScore(r), news_rating: computeNewsRating(r),
    sector_resolved: r.sector || inferSector(r.name),
  })).slice(0, 5);
  const stocks = [...top, ...bot, ...mystery]
    .filter((s, i, arr) => arr.findIndex(x => x.code === s.code) === i);

  // ─── 섹터별 평균 (news_rating + news_score + alpha + mom5) ───
  const sectorStats = {};
  allResults.forEach(r => {
    const sec = r.sector_resolved;
    if (!sec) return;
    if (!sectorStats[sec]) sectorStats[sec] = { codes: [], newsScores: [], ratings: [], alphas5: [], moms5: [] };
    sectorStats[sec].codes.push(r.code);
    sectorStats[sec].newsScores.push(r.news_score);
    sectorStats[sec].ratings.push(r.news_rating);
    sectorStats[sec].moms5.push(r.mom_5 || 0);
    sectorStats[sec].alphas5.push((r.mom_5 || 0) - kospiMomNDays(5));
  });
  const avg = (arr) => arr.length ? arr.reduce((a,b)=>a+b, 0) / arr.length : 0;
  Object.values(sectorStats).forEach(st => {
    st.avgScore = avg(st.newsScores);
    st.avgRating = avg(st.ratings);
    st.avgAlpha = avg(st.alphas5);
    st.avgMom5 = avg(st.moms5);
    st.n = st.codes.length;
  });
  // LLM scope='sector' 뉴스로 backend 가 계산한 섹터 자체 호악재 신호 — sector_news_rating 등
  const sectorSignals = data.sector_signals || {};
  Object.entries(sectorSignals).forEach(([sec, sig]) => {
    if (!sectorStats[sec]) sectorStats[sec] = { codes:[], newsScores:[], ratings:[], alphas5:[], n:0,
                                                 avgScore:0, avgRating:0, avgAlpha:0 };
    sectorStats[sec].sectorBull   = sig.sector_bull || 0;
    sectorStats[sec].sectorBear   = sig.sector_bear || 0;
    sectorStats[sec].stockBull    = sig.stock_bull || 0;
    sectorStats[sec].stockBear    = sig.stock_bear || 0;
    sectorStats[sec].sectorRating = sig.sector_news_rating || 0;
  });

  if (stocks.length === 0) {
    document.body.innerHTML += `<div class="err-msg">표시할 종목 없음</div>`;
    return;
  }

  // regime 표시
  if (data.macro_regime === 'risk_off') {
    regimeChip.style.display = '';
    regimeChip.textContent = '⚠ 위기 시기';
  } else if (data.macro_regime === 'risk_on') {
    regimeChip.style.display = '';
    regimeChip.style.background = 'rgba(74,222,128,0.4)';
    regimeChip.textContent = '☀ 평온 시기';
  }

  // progress segments
  progressEl.innerHTML = stocks.map((_, i) => `<div class="seg" data-i="${i}"><div class="fill"></div></div>`).join('');

  // 카드 렌더 — AdSense 설정 시 every 개마다 광고 카드 삽입
  const adsOn = !!(ADSENSE.client && ADSENSE.slot && ADSENSE.every > 0);
  function renderAdReel() {
    return `
      <div class="reel reel-ad">
        <div class="ad-tag">광고</div>
        <ins class="adsbygoogle" style="display:block;width:100%;max-width:374px;"
             data-ad-client="${ADSENSE.client}" data-ad-slot="${ADSENSE.slot}"
             data-ad-format="fluid" data-full-width-responsive="true"></ins>
      </div>`;
  }
  let reelsHtml = '';
  stocks.forEach((s, i) => {
    reelsHtml += renderReel(s, i, stocks.length);
    if (adsOn && (i + 1) % ADSENSE.every === 0 && i < stocks.length - 1) reelsHtml += renderAdReel();
  });
  reelsEl.innerHTML = reelsHtml;
  if (adsOn) {
    reelsEl.querySelectorAll('ins.adsbygoogle').forEach(() => {
      try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (_) {}
    });
  }

  // ─── 현재 카드 추적 (IntersectionObserver) ───
  // 광고 릴 제외 — reels[i] 가 stocks[i] 와 1:1 이어야 점프·내비가 안 깨짐
  const reels = [...reelsEl.querySelectorAll('.reel[data-idx]')];
  const segs = [...progressEl.querySelectorAll('.seg')];
  let currentIdx = 0;
  function setCurrent(i) {
    currentIdx = i;
    counterEl.textContent = `${i+1} / ${stocks.length}`;
    segs.forEach((seg, j) => {
      seg.classList.toggle('done', j < i);
      seg.classList.toggle('now', j === i);
    });
  }
  setCurrent(0);
  checkSavedDigest();   // 저장 종목 새 소식 배지 (비동기, UI 안 막음)

  // (candle chart 제거됨 — 카드는 종목 vs 코스피 두 박스로 비교)
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting && e.intersectionRatio > 0.6) {
        const i = +e.target.dataset.idx;
        setCurrent(i);
      }
    });
  }, { root: reelsEl, threshold: [0, 0.6, 1] });
  reels.forEach(r => io.observe(r));

  // ─── 키보드 ↑↓ swipe ───
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') {
      e.preventDefault();
      const next = Math.min(stocks.length - 1, currentIdx + 1);
      reels[next]?.scrollIntoView({ behavior: 'smooth' });
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      const prev = Math.max(0, currentIdx - 1);
      reels[prev]?.scrollIntoView({ behavior: 'smooth' });
    }
  });

  // ─── 액션 버튼 ───
  reelsEl.addEventListener('click', (e) => {
    const secLine = e.target.closest('.sector-info-line[data-sector]');
    if (secLine) { openSectorSheet(secLine.dataset.sector); return; }
    const item = e.target.closest('[data-action]');
    const explainTrigger = e.target.closest('[data-explain]');
    if (item) {
      const action = item.dataset.action;
      const reel = item.closest('.reel');
      const idx = +reel?.dataset.idx;
      if (action === 'save') {
        item.classList.toggle('on');
        const saved = JSON.parse(localStorage.getItem('sq_saved') || '[]');
        const code = reel.dataset.code;
        const i = saved.indexOf(code);
        if (i >= 0) saved.splice(i, 1); else saved.push(code);
        localStorage.setItem('sq_saved', JSON.stringify(saved));
        checkSavedDigest();   // 저장 변경 → 새 소식 재확인
      } else if (action === 'chart') {
        openScoreSheet(idx);
      } else if (action === 'news') {
        openNewsSheet(idx);
      }
      return;
    }
    if (explainTrigger) {
      openScoreSheet(+explainTrigger.dataset.explain);
    }
  });

  // ─── 점수 설명 sheet ───
  const scoreSheet = document.getElementById('scoreSheet');
  const scoreBackdrop = document.getElementById('scoreBackdrop');
  const scoreHeadName = document.getElementById('scoreHeadName');
  const scoreBody = document.getElementById('scoreBody');

  function fmtNum(v, sign) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    const s = sign && v > 0 ? '+' : '';
    return s + v.toFixed(2);
  }

  function openScoreSheet(idx) {
    const s = stocks[idx];
    if (!s) return;
    scoreHeadName.textContent = `${s.name} (${s.code})`;
    // 뉴스 점수 분해
    const bd = scoreBreakdown(s);
    const a = computeAlpha(s);

    // ─── 가격 (차트) · 뉴스 (평가) 매칭 ───
    const alpha = a.alpha5;
    const aSign = alpha >= 0 ? '+' : '';
    const aCls = alpha >= 0 ? 'pos' : (alpha < 0 ? 'neg' : 'flat');
    const aLabel = alpha >= 2 ? '코스피보다 강함' :
                    alpha <= -2 ? '코스피보다 약함' :
                    '코스피와 비슷';

    // 뉴스 점수 라벨 (shrinkage 보정 적용)
    const nr = s.news_rating !== undefined ? s.news_rating : computeNewsRating(s);
    let newsLabel = '';
    let newsCls = 'flat';
    if (s.news_count === 0) { newsLabel = '뉴스 없음'; newsCls = 'flat'; }
    else if (nr >= 35) { newsLabel = '좋은 뉴스가 압도적'; newsCls = 'pos'; }
    else if (nr >= 10) { newsLabel = '좋은 뉴스 약간 더 많음'; newsCls = 'pos'; }
    else if (nr <= -35) { newsLabel = '나쁜 뉴스가 압도적'; newsCls = 'neg'; }
    else if (nr <= -10) { newsLabel = '나쁜 뉴스 약간 더 많음'; newsCls = 'neg'; }
    else { newsLabel = '좋은 뉴스·나쁜 뉴스 비슷 (방향 모호)'; newsCls = 'flat'; }

    // 신뢰도 + 순위 (evidence 카드용)
    const _conf = computeConfidence(s);
    const _pctile = rankPercentile(s);

    // 섹터 평균 대비 alpha — attr-grid + section 양쪽에서 사용
    const stkSec = s.sector_resolved || getSector(s);
    const secAvgAlpha = (stkSec && sectorStats[stkSec] && sectorStats[stkSec].n >= 2)
                          ? sectorStats[stkSec].avgAlpha : null;
    const alphaVsSector = secAvgAlpha !== null ? (alpha - secAvgAlpha) : null;

    // 일치 / 불일치 판정 (뉴스 점수 기준)
    const newsPositive = nr >= 10;
    const newsNegative = nr <= -10;
    const pricePositive = alpha >= 2;
    const priceNegative = alpha <= -2;

    let match = { cls: 'mystery', em: '🤔', verdict: '' };
    if (s.news_count === 0 && Math.abs(alpha) >= 2) {
      match = {
        cls: 'mystery', em: '🤔',
        verdict: `<b>원인 미상</b> — 관련 뉴스 없이 가격만 ${aLabel}. 매수 근거로 쓰기엔 약합니다.`
      };
    } else if (newsPositive && pricePositive) {
      match = {
        cls: 'ok', em: '✓',
        verdict: `<b>일치</b> — 좋은 뉴스가 많고 가격도 코스피보다 강해요. 뉴스 분류와 시장 반응이 맞아 떨어진 경우.`
      };
    } else if (newsNegative && priceNegative) {
      match = {
        cls: 'ok', em: '✓',
        verdict: `<b>일치</b> — 나쁜 뉴스가 많고 가격도 코스피보다 약해요. 뉴스 분류와 시장 반응이 맞아 떨어진 경우.`
      };
    } else if (newsPositive && priceNegative) {
      match = {
        cls: 'gap', em: '⚠',
        verdict: `<b>안 맞음</b> — 좋은 뉴스가 많은데 가격은 코스피보다 약해요. 호재가 이미 가격에 반영됐거나, 우리 분류가 부정확할 수 있음.`
      };
    } else if (newsNegative && pricePositive) {
      match = {
        cls: 'gap', em: '⚠',
        verdict: `<b>안 맞음</b> — 나쁜 뉴스가 많은데 가격은 코스피보다 강해요. 시장이 악재를 무시했거나 다른 큰 호재 요인이 있을 수 있음.`
      };
    } else {
      match = {
        cls: 'mystery', em: '·',
        verdict: `방향이 약함 — 뉴스 분위기와 가격 변화 모두 뚜렷하지 않아요.`
      };
    }

    // 이미 반영 경고
    let pricedInWarn = '';
    if (s.priced_in_ratio >= 0.3) {
      pricedInWarn = `<div style="margin-top:8px;font-size:12px;color:#a78bfa;">⚡ 좋은 뉴스 ${(s.priced_in_ratio*100).toFixed(0)}%가 이미 가격에 반영된 상태 — 점수에서 차감됨.</div>`;
    }

    // 섹터 비교 section — news_score + alpha 기준
    const stockSector = s.sector_resolved || getSector(s);
    let sectorHtml = '';
    if (stockSector && sectorStats[stockSector] && sectorStats[stockSector].n >= 2) {
      const st = sectorStats[stockSector];
      const sLabel = sectorLabel(stockSector);
      const myScore = s.news_score;
      const myAlpha = a.alpha5;
      const diff = myScore - st.avgScore;
      const rank = st.newsScores.slice().sort((x,y)=>y-x).indexOf(myScore) + 1;
      const alphaVsSector = myAlpha - st.avgAlpha;
      const better = diff > 0;
      sectorHtml = `
        <section>
          <h4>같은 섹터 (${sLabel}) 안에서</h4>
          <div class="sector-compare">
            <div class="sec-row"><span class="l">이 종목 합성 점수 (참고용)</span><span class="v ${myScore>0?'up':myScore<0?'dn':''}">${myScore.toFixed(2)}</span></div>
            <div class="sec-row"><span class="l">${sLabel} 평균 합성 점수 (${st.n}종목)</span><span class="v">${st.avgScore.toFixed(2)}</span></div>
            <div class="sec-row"><span class="l">${sLabel} 평균 뉴스 분위기</span><span class="v ${st.avgRating>0?'up':st.avgRating<0?'dn':''}">${st.avgRating>0?'+':''}${st.avgRating.toFixed(0)}</span></div>
            ${st.sectorBull !== undefined && (st.sectorBull + st.sectorBear) > 0 ? `
            <div class="sec-row"><span class="l">업종 자체 호재/악재 (LLM scope=sector)</span><span class="v ${st.sectorRating>0?'up':st.sectorRating<0?'dn':''}">${st.sectorRating>0?'+':''}${st.sectorRating.toFixed(0)}</span></div>
            <div class="sec-row"><span class="l">→ 업종 호재 / 악재 건수</span><span class="v">${st.sectorBull} / ${st.sectorBear}</span></div>
            ` : ''}
            <div class="sec-row"><span class="l">${sLabel} 5일간 코스피 대비</span><span class="v ${st.avgAlpha>0?'up':st.avgAlpha<0?'dn':''}">${st.avgAlpha>0?'+':''}${st.avgAlpha.toFixed(1)}%</span></div>
            <div class="sec-row"><span class="l">이 종목 vs ${sLabel} 평균</span><span class="v ${alphaVsSector>0?'up':alphaVsSector<0?'dn':''}">${alphaVsSector>0?'+':''}${alphaVsSector.toFixed(1)}%</span></div>
            <div class="sec-row"><span class="l">${sLabel} 내 순위</span><span class="v">${rank} / ${st.n}</span></div>
          </div>
          <p style="font-size:13px; color: var(--text); margin-top: 10px; line-height: 1.55;">
            ${better
              ? `같은 ${sLabel} ${st.n}종목 중 <b>${rank}위</b>. 합성 점수가 평균보다 <b>+${diff.toFixed(2)}</b> 높고, 가격은 ${sLabel} 평균보다 <b>${alphaVsSector>0?'+':''}${alphaVsSector.toFixed(1)}%</b>.`
              : `같은 ${sLabel} ${st.n}종목 중 <b>${rank}위</b>. 합성 점수가 평균보다 <span class="dn">${diff.toFixed(2)}</span> 낮고, 가격은 ${sLabel} 평균보다 <b>${alphaVsSector>0?'+':''}${alphaVsSector.toFixed(1)}%</b>.`}
          </p>
          <button class="comm-cta" data-comm-scope="sector_${stockSector}" data-comm-name="${sLabel}">
            <span class="arr">›</span>
            <div class="ttl">💬 [${sLabel}] 섹터 토론</div>
            <div class="desc">같은 섹터에 관심 있는 사람들의 의견</div>
          </button>
        </section>
      `;
    }

    scoreBody.innerHTML = `
      <section>
        <h4>가격과 뉴스</h4>
        <div class="attr-grid">
          <div class="attr-row">
            <div class="icon-cell">📊</div>
            <div class="body-cell">
              <div class="title">5일 수익률</div>
              <div class="value">
                <span class="${s.mom_5>0?'pos':s.mom_5<0?'neg':'flat'}">${s.mom_5>0?'+':''}${s.mom_5.toFixed(1)}%</span>
                <span style="opacity:0.55;font-size:11px;margin-left:6px;">vs 코스피 ${a.kospi5>0?'+':''}${a.kospi5.toFixed(1)}%</span>
              </div>
              <div class="extra"><b class="${aCls}">${aSign}${alpha.toFixed(1)}%p</b> · ${aLabel}${alphaVsSector !== undefined && alphaVsSector !== null
                  ? ` · 섹터 평균 대비 <b>${alphaVsSector>0?'+':''}${alphaVsSector.toFixed(1)}%p</b>`
                  : ''}</div>
            </div>
          </div>
          <div class="attr-row">
            <div class="icon-cell">📰</div>
            <div class="body-cell">
              <div class="title">뉴스 분위기 (${nr>0?'+':''}${nr.toFixed(0)})</div>
              <div class="value">
                <span class="${newsCls}">${newsLabel}</span>
              </div>
              <div class="extra">실제 사건 ${s.sub_count}건 (좋은 ${s.news_bull||0} / 나쁜 ${s.news_bear||0})</div>
            </div>
          </div>
          <div class="match-box ${match.cls}">
            <div class="em">${match.em}</div>
            <div class="verdict">${match.verdict}${pricedInWarn}</div>
          </div>
        </div>
      </section>

      <section>
        <h4>이 평가의 근거</h4>
        <div class="ev-grid">
          <div class="ev-row">
            <div class="ev-l">신뢰도</div>
            <div class="ev-r"><b class="sc-${_conf.level}">${_conf.label}</b> <span style="opacity:0.6;font-size:11px;">— ${_conf.short}</span></div>
          </div>
          <div class="ev-bar"><div class="sc-fill sc-fill-${_conf.level}" style="width:${_conf.pct}%"></div></div>
          <div class="ev-row"><div class="ev-l">표본 크기</div><div class="ev-r">전체 ${s.news_count}건 · 실질 ${s.sub_count}건</div></div>
          <div class="ev-row"><div class="ev-l">언론사 신뢰도 (평균)</div><div class="ev-r">${(s.src_avg || 0).toFixed(2)} <span style="opacity:0.5;font-size:11px;">(${(s.src_avg||0) >= 0.55 ? '높음' : (s.src_avg||0) >= 0.45 ? '보통' : '낮음'})</span></div></div>
          <div class="ev-row"><div class="ev-l">호재 / 악재</div><div class="ev-r">좋은 <b class="up">${s.news_bull||0}</b> / 나쁜 <b class="dn">${s.news_bear||0}</b></div></div>
          ${_pctile ? `<div class="ev-row"><div class="ev-l">합성 점수 순위 (참고용)</div><div class="ev-r"><b>${_pctile.rank}위</b> / ${_pctile.total}종목 (상위 ${_pctile.pct}%)</div></div>` : ''}
          <div class="ev-row"><div class="ev-l">과거 1년 backtest (KR · 시계열 검증)</div><div class="ev-r" style="font-size:11.5px;opacity:0.75;">미래 예측 R² <b>&lt; 0 (불가)</b> · 과거 설명 R² <b>+0.013</b></div></div>
        </div>
        <p style="font-size:11px;color: var(--text-3);margin-top:10px;line-height:1.55;">
          ※ <b>신뢰도</b>는 표본 크기·실질 뉴스 비율·언론사 평균을 종합한 등급입니다.
          데이터 부족 시 자동으로 <b>보류</b>로 분류됩니다.<br>
          ※ 카드에는 <b>세어볼 수 있는 집계(호재/악재 건수)</b>만 표시합니다.
          하나로 합친 '뉴스 점수'는 자체 검증에서 예측력이 확인되지 않아 참고 지표로만 남겼습니다.<br>
          ※ 이 평가는 <b>미래 가격을 예측하지 않습니다</b> — 이미 일어난 변동을 설명하는 사후 분석입니다 (시계열 backtest로 검증).
        </p>
      </section>

      ${sectorHtml}

      <section>
        <h4>솔직한 한계</h4>
        <div class="limits-box">
          <b>과거에 잘 맞았다고 미래에도 맞으리란 보장은 없어요</b>.<br>
          본 서비스는 의사결정 참고용일 뿐, 매수·매도를 권유하지 않습니다.<br>
          뉴스 본문이 아닌 <b>제목과 요약만 분석</b>하므로 정확도에 한계가 있습니다.
        </div>
      </section>

      <section id="evtTimelineSec">
        <h4>📅 최근 큰 변동과 그 원인</h4>
        <div id="evtTimeline" class="news-load" style="padding:16px;text-align:center;opacity:0.5;font-size:12px;">⌛ 이벤트 분석 중...</div>
      </section>

      <section>
        <h4>💬 커뮤니티</h4>
        <button class="comm-cta" data-comm-scope="stock_${s.code}" data-comm-name="${s.name}">
          <span class="arr">›</span>
          <div class="ttl">💬 ${s.name} 토론</div>
          <div class="desc">이 종목에 대한 다른 사람들의 생각</div>
        </button>
      </section>
    `;
    openSheet(scoreSheet, scoreBackdrop);
    loadEventTimeline(s.code);
  }

  // ─── Event-driven attribution 타임라인 (lazy) ───
  async function loadEventTimeline(code) {
    const el = document.getElementById('evtTimeline');
    if (!el) return;
    try {
      const r = await fetch(`${API_BASE}/api/stock-events?code=${code}&market=${CURRENT_MARKET}&days=60&threshold=2.5`);
      const j = await r.json();
      if (j.error) { el.innerHTML = `<div style="opacity:0.5;font-size:12px;">분석 실패: ${j.error}</div>`; return; }
      const evs = j.events || [];
      const cov = j.coverage || {};
      if (evs.length === 0) {
        el.innerHTML = '<div style="opacity:0.55;font-size:12.5px;padding:6px 0;">최근 60일간 시장 대비 ±2.5% 이상 움직인 날이 없어요.</div>';

      const headHtml = `
        <div style="font-size:11.5px;color: var(--text-3);margin-bottom:10px;line-height:1.5;">
          최근 60일 중 시장 대비 ±2.5% 이상 변동 <b style="color: var(--text);">${cov.n_events}일</b> ·
          직전 48시간에 같은 방향 사건 뉴스가 있던 날 <b style="color:#4ade80;">${cov.explained}일</b>
          ${cov.unexplained ? `· 뉴스 없음 <b style="color:#a78bfa;">${cov.unexplained}일</b>` : ''}
        </div>`;
      const rows = evs.slice(0, 6).map(ev => {
        const dirCls = ev.direction === 'up' ? 'up' : 'dn';

        const badge = ev.attribution === 'explained'
          ? '<span style="color:#4ade80;font-size:10px;font-weight:700;">관련 뉴스 있음</span>'
          : ev.attribution === 'partial'
            ? '<span style="color:#fbbf24;font-size:10px;font-weight:700;">반대 방향 뉴스만</span>'
            : '<span style="color:#a78bfa;font-size:10px;font-weight:700;">뉴스 없음</span>';
        const newsHtml = (ev.matched || []).slice(0, 2).map(m => `
          <div style="font-size:11px;color: var(--text-2);margin-top:4px;padding-left:10px;border-left:2px solid rgba(255,255,255,0.15);" ${m.link ? `data-link="${m.link}"` : ''}>
            ${m.sentiment === 'bull' ? '🟢' : '🔴'} ${m.title}
          </div>`).join('');
        return `
          <div style="padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);">
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:12.5px;">
              <span style="opacity:0.7;">${ev.date}</span>
              <span><b class="${dirCls}" style="font-variant-numeric:tabular-nums;">${sign}${ev.rel_move_pct.toFixed(1)}%p</b> ${badge}</span>
            </div>
            ${newsHtml || '<div style="font-size:10.5px;opacity:0.4;margin-top:3px;">연결되는 사건 뉴스 없음</div>'}
          </div>`;
      }).join('');
      el.innerHTML = headHtml + rows + `
        <p style="font-size:10px;color: var(--text-3);margin-top:8px;line-height:1.5;">
          ※ 변동일 직전 48시간 안에 나온 사건 뉴스를 보여드립니다 (시장 대비 상대 변동 기준).<br>
          ※ <b>주의</b>: 대형주는 평소에도 사건 뉴스가 흔합니다. 자체 검증 결과, 뉴스가 곁에 있다는 것만으로
          그것이 변동의 <b>원인이라고 볼 통계적 근거는 없었습니다</b>. 변동 전후 맥락을 빠르게 훑는 용도로 쓰세요.
        </p>`;
      el.classList.remove('news-load');
      el.style.cssText = '';
    } catch (e) {
      el.innerHTML = `<div style="opacity:0.5;font-size:12px;">분석 실패</div>`;

  // ─── 뉴스 sheet ───
  const newsSheet = document.getElementById('newsSheet');

  const newsHeadSub = document.getElementById('newsHeadSub');

  function timeAgo(ts) {
    const d = (Date.now() - ts) / 1000;
    if (d < 60) return '방금';
    if (d < 3600) return Math.floor(d/60) + '분 전';
    if (d < 86400) return Math.floor(d/3600) + '시간 전';
    return Math.floor(d/86400) + '일 전';
  }

  // 뉴스 모달 상태 — 필터 토글
  let _newsState = { stockIdx: -1, all: [], filter: 'all' };

  function _renderNewsList() {
    const arts = _newsState.all;
    const filt = _newsState.filter;
    const visible = arts.filter(a => {
      if (filt === 'bull') return a.sentiment === 'bull';
      if (filt === 'bear') return a.sentiment === 'bear';
      if (filt === 'sub') return a.substance === 'substantive';
      return true;
    });
    if (visible.length === 0) {
      newsBody.querySelector('#newsListInner').innerHTML =
        '<div class="news-empty" style="padding:24px;text-align:center;opacity:0.6;">표시할 뉴스가 없습니다.</div>';

    newsBody.querySelector('#newsListInner').innerHTML = visible.slice(0, 40).map(a => `

          ${a.category && a.category !== '기타' ? `<span class="chip cat">${a.category}</span>` : ''}

  async function openNewsSheet(idx) { return openNewsSheetFor(stocks[idx]); }
  // 검색 등에서 핫 목록에 없는 종목도 열 수 있게 — s = {code, name, mom_5?}
  async function openNewsSheetFor(s) {
    if (!s) return;
    _newsState = { stockIdx: -1, all: [], filter: 'all' };
    newsHeadName.textContent = `${s.name} (${s.code})`;
    newsHeadSub.innerHTML = '로딩중...';
    newsBody.innerHTML = '<div class="news-load">⌛ 뉴스 가져오는 중...</div>';
    openSheet(newsSheet, newsBackdrop);
    try {
      const r = await fetch(`${API_BASE}/api/stock-news?code=${s.code}&market=${CURRENT_MARKET}&page=1&page_size=50`);
      const j = await r.json();
      // 실제 사건(substantive) 우선 + 그 외 뉴스(off_topic·이미반영 제외)도 표시
      // — 대형주는 실제 사건이 적어 사건만 보이면 비어 보이므로 참고 뉴스도 노출
      const all = (j.articles || []);
      const substantive = all.filter(a => !a.priced_in && a.substance === 'substantive');
      const others = all.filter(a => !a.priced_in && a.substance !== 'substantive'
                                     && a.llm_label !== 'off_topic');
      const arts = [...substantive, ...others];
      _newsState.all = arts;
      _newsState.subCount = substantive.length;

      const a = computeAlpha(s);
      const sectorAvgAlpha = (() => {
        const sec = s.sector_resolved || getSector(s);
        return (sec && sectorStats[sec] && sectorStats[sec].n >= 2) ? sectorStats[sec].avgAlpha : null;
      })();
      const sectorAlpha = sectorAvgAlpha !== null ? (a.alpha5 - sectorAvgAlpha) : null;

      const bullN = arts.filter(x => x.sentiment === 'bull').length;
      const bearN = arts.filter(x => x.sentiment === 'bear').length;
      const hasMom = typeof s.mom_5 === 'number';
      let retLine = '';
      if (hasMom) {
        const stockSign = s.mom_5 >= 0 ? '+' : '';
        const kospiSign = a.kospi5 >= 0 ? '+' : '';
        const aSign = a.alpha5 >= 0 ? '+' : '';
        const sSign = sectorAlpha !== null && sectorAlpha >= 0 ? '+' : '';
        const stockCls = s.mom_5 > 0 ? 'up' : (s.mom_5 < 0 ? 'dn' : 'flat');
        const aCls = a.alpha5 > 0 ? 'up' : (a.alpha5 < 0 ? 'dn' : 'flat');
        const sCls = sectorAlpha === null ? 'flat' : (sectorAlpha > 0 ? 'up' : (sectorAlpha < 0 ? 'dn' : 'flat'));
        retLine = `
          <div style="display:flex;flex-wrap:wrap;gap:4px 10px;opacity:0.85;">
            <span>5일 종목 <b class="${stockCls}">${stockSign}${s.mom_5.toFixed(1)}%</b></span>
            <span>vs 코스피 <b>${kospiSign}${a.kospi5.toFixed(1)}%</b></span>
            <span>→ 차이 <b class="${aCls}">${aSign}${a.alpha5.toFixed(1)}%p</b></span>
            ${sectorAlpha !== null ? `<span>· 섹터 대비 <b class="${sCls}">${sSign}${sectorAlpha.toFixed(1)}%p</b></span>` : ''}
          </div>`;
      }

      // 헤더 — 실제 사건 건수 + (있으면) 5일 수익률·코스피·섹터 대비
      const subN = _newsState.subCount || 0;
      newsHeadSub.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;line-height:1.45;">
          <div style="opacity:0.85;">실제 사건 <b>${subN}</b>건 · 참고 뉴스 <b>${arts.length - subN}</b>건 <span style="opacity:0.6">(거시·무관 기사 제외)</span></div>
          ${retLine}
        </div>
      `;

      // 본문 — 필터 탭 + 리스트
      newsBody.innerHTML = `
        <div class="news-filter-bar" style="display:flex;gap:8px;padding:10px 4px 14px 4px;border-bottom:1px solid var(--border);margin-bottom:8px;">
          <button class="nf-tab active" data-filt="all">전체 ${arts.length}</button>
          <button class="nf-tab" data-filt="sub">실제 사건 ${subN}</button>
          <button class="nf-tab nf-bull" data-filt="bull">호재 ${bullN}</button>
          <button class="nf-tab nf-bear" data-filt="bear">악재 ${bearN}</button>
        </div>
        <div id="newsListInner"></div>
      `;
      _renderNewsList();
    } catch (e) {
      newsHeadSub.textContent = '오류';
      newsBody.innerHTML = `<div class="news-empty">뉴스 fetch 실패: ${e.message}</div>`;
    }
  }

  newsBody.addEventListener('click', (e) => {

    const tab = e.target.closest('.nf-tab');

  // ─── sheet 공통 ───

  // ─── 섹터 상세 시트 — 같은 섹터 종목 + 업종 뉴스 ───
  const sectorSheet = document.getElementById('sectorSheet');

    // 같은 섹터 종목 (전체 universe 200) — alpha 순

      : arts.slice(0, 20).map(a => `
        <div class="news-row" data-link="${a.link || ''}">
          <div class="meta-row"><span class="src">${a.paper || ''}</span><span class="time">${timeAgo(a.ts || Date.now())}</span></div>
          <div class="ttl">${a.title || ''}</div>
          <div class="chips">
            ${a.sentiment === 'bull' ? '<span class="chip bull">호재</span>' : a.sentiment === 'bear' ? '<span class="chip bear">악재</span>' : ''}
            <span class="chip cat">업종 전반</span>
          </div>
        </div>`).join('');
    document.getElementById('sectorSheetBody').innerHTML = `
      <div class="sec-sheet-h4">이 섹터 종목 ${inSec.length}개 · 코스피 대비 5일 수익률 순</div>
      ${stocksHtml || '<div style="color:var(--text-3);font-size:13px;">종목 없음</div>'}
      <div class="sec-sheet-h4">업종 전반 뉴스 ${arts.length}건 ${arts.length?`(호재 ${bN}·악재 ${rN})`:''}</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:6px;line-height:1.5;">개별 종목이 아닌 <b>업종 전체</b>에 영향 미치는 사건만 골라낸 거예요.</div>
      ${artsHtml}`;
    openSheet(sectorSheet, sectorBackdrop);
    // 종목 클릭 → 핫 탭 점프 (피드에 있으면)
    document.getElementById('sectorSheetBody').querySelectorAll('.sec-stock-row[data-jump]').forEach(row => {
      row.addEventListener('click', () => {
        const idx = stocks.findIndex(x => x.code === row.dataset.jump);
        if (idx < 0) return;
        closeSheet(sectorSheet, sectorBackdrop);
        switchTab('hot');
        reels[idx].scrollIntoView({ behavior: 'instant', block: 'start' });
      });
    });
    document.getElementById('sectorSheetBody').querySelectorAll('.news-row[data-link]').forEach(row => {
      row.addEventListener('click', () => { if (row.dataset.link) window.open(row.dataset.link, '_blank'); });
    });
  }
  sectorBackdrop.addEventListener('click', () => closeSheet(sectorSheet, sectorBackdrop));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeSheet(scoreSheet, scoreBackdrop);
      closeSheet(newsSheet, newsBackdrop);
      closeSheet(sectorSheet, sectorBackdrop);
    }
  });
  // swipe down to close — 리스트가 맨 위일 때 시작한 제스처만 닫기로 인정
  // (이전 버그: sheet.scrollTop은 항상 0이라 리스트 스크롤 중에도 시트가 닫혔음)
  [scoreSheet, newsSheet].forEach(sheet => {
    const body = sheet.querySelector('.sheet-body');
    let startY = 0, startedAtTop = false;
    sheet.addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY;
      startedAtTop = !body || body.scrollTop <= 0;
    }, { passive: true });
    sheet.addEventListener('touchend', (e) => {
      const dy = e.changedTouches[0].clientY - startY;
      if (dy > 80 && startedAtTop && (!body || body.scrollTop <= 0)) {
        const bd = sheet === scoreSheet ? scoreBackdrop : newsBackdrop;
        closeSheet(sheet, bd);
      }
    }, { passive: true });
  });

  // ─── 저장 탭 ───
  const savedView = document.getElementById('savedView');
  const savedList = document.getElementById('savedList');
  const savedSub = document.getElementById('savedSub');

  function getSavedCodes() {
    return JSON.parse(localStorage.getItem('sq_saved') || '[]');
  }
  function setSavedCodes(arr) {
    localStorage.setItem('sq_saved', JSON.stringify(arr));
  }

  // ─── 저장 종목 다이제스트 — 새 사건 뉴스·큰 변동 알림 ───
  // (_digestData 선언은 위 활성탭 근처로 이동 — TDZ 방지)
  function _digestSeen() { return JSON.parse(localStorage.getItem('sq_digest_seen') || '{}'); }
  function _digestUnseen() {
    if (!_digestData) return 0;
    const seen = _digestSeen();
    let n = 0;
    _digestData.items.forEach(it => {
      const last = seen[it.code] || 0;
      it.events.forEach(e => { if ((e.ts || 0) > last) n++; });
      if (it.big_move && (it.big_move.ts || 0) > last) n++;
    });
    return n;
  }
  function updateSavedBadge() {
    const el = document.querySelector('.bot-nav .it[data-tab="saved"]');
    if (!el) return;
    el.querySelector('.nav-dot')?.remove();
    const n = _digestUnseen();
    if (n > 0) {
      const d = document.createElement('span');
      d.className = 'nav-dot';
      d.textContent = n > 9 ? '9+' : n;
      el.appendChild(d);
    }
  }
  async function checkSavedDigest() {
    const codes = getSavedCodes();
    if (!codes.length) { _digestData = null; updateSavedBadge(); return; }
    try {
      const r = await fetch(`${API_BASE}/api/saved-digest?codes=${codes.join(',')}&market=${CURRENT_MARKET}`);
      const j = await r.json();
      if (j.items) { _digestData = j; updateSavedBadge(); }
    } catch (_) {}
  }
  function _digestSectionHtml() {
    if (!_digestData) return '';
    const seen = _digestSeen();
    const rows = [];
    _digestData.items.forEach(it => {
      const last = seen[it.code] || 0;
      if (it.big_move) rows.push({ type: 'move', it, ts: it.big_move.ts || 0, fresh: (it.big_move.ts || 0) > last });
      it.events.forEach(e => rows.push({ type: 'news', it, e, ts: e.ts || 0, fresh: (e.ts || 0) > last }));
    });
    if (!rows.length) return '';
    rows.sort((a, b) => b.ts - a.ts);
    const body = rows.slice(0, 20).map(r => {
      if (r.type === 'move') {
        const m = r.it.big_move;
        const cls = m.rel_pct > 0 ? 'up' : 'dn';
        return `
          <div class="dg-row ${r.fresh ? 'fresh' : ''}">
            <div class="dg-meta"><b>${r.it.name}</b> · ${m.date}${r.fresh ? ' · <span class="dg-new">NEW</span>' : ''}</div>
            <div class="dg-ttl">📈 코스피 대비 <b class="${cls}">${m.rel_pct > 0 ? '+' : ''}${m.rel_pct}%p</b> 큰 변동
              <span style="opacity:0.6">(절대 ${m.abs_pct > 0 ? '+' : ''}${m.abs_pct}%)</span></div>
            <div class="dg-cmt">${m.has_news ? '같은 기간 사건 뉴스 있음 — 아래 항목 참고' : '관련 사건 뉴스 없음 — 원인 미상 변동'}</div>
          </div>`;
      }
      const e = r.e;
      return `
        <div class="dg-row ${r.fresh ? 'fresh' : ''}" data-link="${e.link || ''}">
          <div class="dg-meta"><b>${r.it.name}</b> · ${e.paper || ''} · ${timeAgo(e.ts)}${r.fresh ? ' · <span class="dg-new">NEW</span>' : ''}</div>
          <div class="dg-ttl"><span class="chip ${e.sentiment === 'bull' ? 'bull' : 'bear'}">${e.sentiment === 'bull' ? '호재' : '악재'}</span> ${e.title || ''}</div>
          ${e.comment ? `<div class="dg-cmt">💬 ${e.comment}</div>` : ''}
        </div>`;
    }).join('');
    return `
      <div class="dg-section">
        <div class="dg-head">📬 새 소식 <span style="font-size:10.5px;opacity:0.55;font-weight:400;">최근 ${_digestData.days}일 · 실제 사건·큰 변동만</span></div>
        ${body}
      </div>`;
  }
  function _digestMarkSeen() {
    if (!_digestData) return;
    const seen = _digestSeen();
    _digestData.items.forEach(it => {
      let m = seen[it.code] || 0;
      it.events.forEach(e => { m = Math.max(m, e.ts || 0); });
      if (it.big_move) m = Math.max(m, it.big_move.ts || 0);
      seen[it.code] = m;
    });

  document.querySelector('.bot-nav').addEventListener('click', (e) => {

  // ─── 탐색 탭 — universe 검색 ───
  let universeCache = null;
  async function loadUniverse() {
    if (universeCache) return universeCache;
    try {
      const r = await fetch(`${API_BASE}/api/universe?market=${CURRENT_MARKET}`);
      const j = await r.json();
      universeCache = Object.entries(j.tickers || {}).map(([code, info]) => ({
        code, name: info.name, market: info.market,
      }));
    } catch (e) {
      universeCache = [];
    }
    return universeCache;
  }
  const exploreInput = document.getElementById('exploreInput');
  const exploreResults = document.getElementById('exploreResults');

  function esc(s) {
    // XSS 방지 — 텍스트 출력 시 항상 사용
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  async function renderExplore(query) {
    const uni = await loadUniverse();
    if (!uni.length) {
      exploreResults.innerHTML = '<div class="ex-empty">⌛ universe 로딩 실패</div>';
      return;
    }
    // 공백·대소문자 무시 정규화 — "삼성 전자", "lg화학" 도 매칭
    const norm = (t) => String(t || '').toLowerCase().replace(/\s+/g, '');
    const q = norm(query);
    let filtered;
    if (!q) {
      // 빈 검색이면 핫 종목 + 안내
      filtered = stocks.slice(0, 20).map(s => ({ ...s, hot: true }));
      exploreResults.innerHTML = filtered.map(s => exploreRowHtml(s)).join('') ||
        '<div class="ex-empty">검색어를 입력하세요</div>';
      return;
    }
    const hotCodes = new Set(stocks.map(x => x.code));
    // 매칭 + 랭킹: 이름 일치 > 이름 시작 > 이름 포함 > 코드, 동순위면 핫 우선
    filtered = uni
      .map(s => {
        const nm = norm(s.name);
        let rank = -1;
        if (nm === q) rank = 0;
        else if (nm.startsWith(q)) rank = 1;
        else if (nm.includes(q)) rank = 2;
        else if (s.code.includes(q)) rank = 3;
        return rank < 0 ? null : { ...s, hot: hotCodes.has(s.code), _rank: rank };
      })
      .filter(Boolean)
      .sort((x, y) => (x._rank - y._rank) || (y.hot - x.hot) || x.name.localeCompare(y.name))
      .slice(0, 50);
    if (filtered.length === 0) {
      exploreResults.innerHTML = `<div class="ex-empty">"${esc(query)}" 검색 결과 없음<br><br>종목명 또는 6자리 코드로 검색하세요.<br><span style="opacity:0.6;font-size:11px;">※ 시총 상위 ~400개 종목만 검색됩니다</span></div>`;
      return;
    }
    exploreResults.innerHTML = filtered.map(s => exploreRowHtml(s)).join('');
  }
  function exploreRowHtml(s) {

    const hotBadge = s.hot ? '<span class="ex-badge hot">🔥 핫</span>' : '<span class="ex-badge muted">—</span>';
    return `
      <div class="ex-row" data-code="${esc(s.code)}">
        <div class="ex-info">
          <div class="ex-name">${esc(s.name)}</div>
          <div class="ex-meta">${esc(s.code)} · ${esc(s.market || '')}${sec ? ' · ' + esc(sec) : ''}</div>

        ${hotBadge}

  }

    const scope = cta.dataset.commScope;
    const name = cta.dataset.commName;
    closeSheet(scoreSheet, scoreBackdrop);
    setTimeout(() => openCommunity(scope, name), 320);
  });

  savedList.addEventListener('click', (e) => {
    const rm = e.target.closest('[data-rm]');
    if (rm) {
      e.stopPropagation();
      const code = rm.dataset.rm;
      setSavedCodes(getSavedCodes().filter(c => c !== code));
      renderSavedList();
      // 핫 탭의 reel에도 반영
      document.querySelectorAll(`.reel[data-code="${code}"] .item[data-action="save"]`).forEach(el => el.classList.remove('on'));
      return;
    }
    const card = e.target.closest('.sv-card');
    if (card) {
      const code = card.dataset.code;
      const idx = stocks.findIndex(s => s.code === code);
      if (idx >= 0) {
        showTab('hot');
        reels[idx].scrollIntoView({ behavior: 'instant', block: 'start' });
      }
    }
  });

  // 핫 탭의 저장 액션을 localStorage 갱신 (기존 코드 보강)
  // (기존 reelsEl 클릭 핸들러에서 이미 처리되지만 명시적으로 재정렬)
  // → 기존 핸들러에서 이미 sq_saved 갱신함

  console.log(`[Shorts] ${stocks.length} reels loaded · regime=${data.macro_regime} · saved=${getSavedCodes().length}`);
})();
</script>
</body>
</html>
