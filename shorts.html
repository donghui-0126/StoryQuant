<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- 보안 — CSP -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.gstatic.com https://apis.google.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.googletagservices.com https://adservice.google.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' http://127.0.0.1:8765 https://*.trycloudflare.com https://*.supabase.co wss://*.supabase.co https://*.googleapis.com https://*.googlesyndication.com https://*.doubleclick.net https://*.google.com; font-src 'self' data: https://cdn.jsdelivr.net; frame-src https://*.firebaseapp.com https://accounts.google.com https://*.doubleclick.net https://*.googlesyndication.com https://www.google.com; frame-ancestors 'none';">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>StoryQuant Shorts</title>
<!-- Pretendard (가독성 한글 폰트) -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<!-- Supabase SDK (있으면 클라우드 모드, 없거나 미설정 시 localStorage fallback) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<style>
  /* ─── 테마 변수 (다크 기본) ─── */
  :root {
    --page-bg: #000;
    --reel-base: #0a0908;       /* reel 그라데이션 하단 */
    --reel-flat-top: #15130f;
    --text: #ffffff;
    --text-2: rgba(255,255,255,0.7);
    --text-3: rgba(255,255,255,0.5);
    --surface: rgba(255,255,255,0.06);
    --surface-2: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.12);
    --sheet-bg: #1a1714;
    --bg-soft: #15130f;
    --nav-bg: rgba(0,0,0,0.55);
    --pos: #4ade80; --neg: #f87171; --accent: #f4c869;
    --fs: 1;                    /* 글씨 크기 배율 (설정에서 변경) */
  }
  body.light {
    --page-bg: #eceef1;          /* 차분한 중성 회색 — 흰 카드가 떠 보이도록 */
    --reel-base: #fbfcfd;        /* 거의 흰 카드 (살짝 쿨톤) */
    --reel-flat-top: #ffffff;
    --text: #1a1d23;             /* 선명한 near-black (쿨) */
    --text-2: #5a626e;           /* 보조 — 충분히 진한 슬레이트 */
    --text-3: #949aa4;           /* 약한 메타 */
    --surface: #ffffff;          /* 내부 카드는 흰색으로 띄움 */
    --surface-2: #f0f2f5;
    --border: rgba(20,25,35,0.10);
    --sheet-bg: #ffffff;
    --bg-soft: #f4f6f8;
    --nav-bg: rgba(255,255,255,0.92);
    /* 흰 배경에서 또렷하면서도 과하지 않은 채도 */
    --pos: #1a9d54; --neg: #e0483d; --accent: #2563eb;
  }
  body.light .phone { box-shadow: none; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--page-bg);
    color: var(--text);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif;
    overflow: hidden;
    height: 100%;
    height: 100dvh;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.25s;
  }

  /* desktop = phone frame 가운데, mobile = 풀스크린 */
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .phone {
    width: 100%; height: 100%;
    max-width: 100vw; max-height: 100vh;
    background: var(--page-bg);
    position: relative;
    overflow: hidden;
  }
  @media (min-width: 500px) {
    body { padding: 20px; }
    .phone {
      width: 390px; height: 844px;
      max-height: calc(100vh - 40px);
      border: 8px solid #1a1a1a;
      border-radius: 38px;
    }
  }

  /* top progress bar */
  .progress {
    position: absolute; top: max(env(safe-area-inset-top, 0px), 10px); left: 10px; right: 10px;
    display: flex; gap: 3px; z-index: 20;
  }
  .progress .seg {
    flex: 1; height: 2.5px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px; overflow: hidden;
  }
  .progress .seg .fill { height: 100%; background: white; width: 0; transition: width 0.3s linear; }
  .progress .seg.done .fill { width: 100%; }
  .progress .seg.now .fill { width: 100%; }

  /* top meta */
  .top-meta {
    position: absolute; top: calc(max(env(safe-area-inset-top, 0px), 10px) + 14px);
    left: 14px; right: 14px;
    z-index: 19;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text); font-size: 11px;
  }
  .top-meta .cat-chip {
    background: rgba(255,255,255,0.18);
    padding: 4px 10px; border-radius: 999px;
    backdrop-filter: blur(8px);
    font-weight: 600; letter-spacing: 0.04em;
  }
  .top-meta .regime-chip {
    background: rgba(255,72,54,0.4);
    padding: 4px 10px; border-radius: 999px;
    backdrop-filter: blur(8px);
    font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .top-meta .counter { opacity: 0.7; font-variant-numeric: tabular-nums; }

  /* reels stack */
  .reels {
    position: absolute; inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .reels::-webkit-scrollbar { display: none; }

  .reel {
    width: 100%; height: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
    display: flex; flex-direction: column;
    padding: 64px 18px 96px;
    color: var(--text);
    /* 짧은 화면에서 내용이 넘치면 카드 내부 스크롤 (CTA 잘림 방지) */
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }
  .reel::-webkit-scrollbar { display: none; }
  /* 광고 카드 (AdSense in-feed) */
  .reel-ad {
    justify-content: center; align-items: center;
    background: var(--reel-flat-top);
    overflow: hidden;
  }
  .reel-ad .ad-tag {
    position: absolute; top: 56px; left: 18px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text-3);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; padding: 2px 6px;
  }
  .reel.up   { background: radial-gradient(circle at 70% 25%, rgba(74,222,128,0.18), transparent 55%), linear-gradient(180deg, rgba(74,222,128,0.08), var(--reel-base) 70%); }
  .reel.upS  { background: radial-gradient(circle at 70% 25%, rgba(74,222,128,0.28), transparent 55%), linear-gradient(180deg, rgba(74,222,128,0.14), var(--reel-base) 70%); }
  .reel.dn   { background: radial-gradient(circle at 70% 25%, rgba(239,68,68,0.18), transparent 55%), linear-gradient(180deg, rgba(239,68,68,0.08), var(--reel-base) 70%); }
  .reel.dnS  { background: radial-gradient(circle at 70% 25%, rgba(239,68,68,0.28), transparent 55%), linear-gradient(180deg, rgba(239,68,68,0.14), var(--reel-base) 70%); }
  .reel.flat { background: linear-gradient(180deg, var(--reel-flat-top), var(--reel-base) 70%); }
  .reel.mystery { background: radial-gradient(circle at 70% 25%, rgba(167,139,250,0.24), transparent 55%), linear-gradient(180deg, rgba(167,139,250,0.12), var(--reel-base) 70%); }
  /* 라이트 모드 — 그라데이션 채도/세기 대폭 완화 (눈 피로 방지) */
  body.light .reel.up   { background: radial-gradient(circle at 75% 18%, rgba(47,158,94,0.08), transparent 50%), linear-gradient(180deg, rgba(47,158,94,0.05), var(--reel-base) 60%); }
  body.light .reel.upS  { background: radial-gradient(circle at 75% 18%, rgba(47,158,94,0.12), transparent 50%), linear-gradient(180deg, rgba(47,158,94,0.07), var(--reel-base) 60%); }
  body.light .reel.dn   { background: radial-gradient(circle at 75% 18%, rgba(207,90,82,0.08), transparent 50%), linear-gradient(180deg, rgba(207,90,82,0.05), var(--reel-base) 60%); }
  body.light .reel.dnS  { background: radial-gradient(circle at 75% 18%, rgba(207,90,82,0.12), transparent 50%), linear-gradient(180deg, rgba(207,90,82,0.07), var(--reel-base) 60%); }
  body.light .reel.mystery { background: radial-gradient(circle at 75% 18%, rgba(139,110,230,0.10), transparent 50%), linear-gradient(180deg, rgba(139,110,230,0.06), var(--reel-base) 60%); }

  .ticker-row { font-size: 11px; opacity: 0.75; margin-bottom: 6px; letter-spacing: 0.02em; }
  .sector-info-line {
    font-size: 10.5px; opacity: 0.92;
    margin-bottom: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 9px;
    display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
    cursor: pointer;
  }
  .sector-info-line:active { background: var(--surface-2); }
  .sector-info-line .sec-name { color: var(--accent); font-weight: 700; }
  .sector-info-line .sec-go { color: var(--accent); font-weight: 700; margin-left: auto; }
  .sector-info-line .sec-pol-pos { color: var(--pos); font-weight: 600; }
  .sector-info-line .sec-pol-neg { color: var(--neg); font-weight: 600; }
  .sector-info-line .sec-pol-flat { color: var(--text-3); font-weight: 600; }
  /* 섹터 시트 종목 행 */
  .sec-stock-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .sec-stock-row .ssr-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .sec-stock-row .ssr-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .sec-stock-row .ssr-alpha { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .sec-stock-row .ssr-alpha.up { color: var(--pos); } .sec-stock-row .ssr-alpha.dn { color: var(--neg); }
  .sec-sheet-h4 { font-size: 13px; font-weight: 800; color: var(--text); margin: 18px 0 6px; }
  .reel h3 { font-size: 24px; margin-bottom: 14px; font-weight: 700; letter-spacing: -0.01em; }

  /* ─── 뉴스 점수 HERO (최상단 강조) ─── */
  .score-hero {
    border-radius: 16px;
    padding: 14px 16px 12px;
    margin: 10px 0 12px;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1.5px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .score-hero:active { transform: scale(0.985); }
  .score-hero-pos {
    background: linear-gradient(135deg, rgba(74,222,128,0.32), rgba(74,222,128,0.08));
    border-color: rgba(74,222,128,0.55);
    box-shadow: 0 6px 30px rgba(74,222,128,0.20);
  }
  .score-hero-neg {
    background: linear-gradient(135deg, rgba(239,68,68,0.32), rgba(239,68,68,0.08));
    border-color: rgba(239,68,68,0.55);
    box-shadow: 0 6px 30px rgba(239,68,68,0.20);
  }
  .score-hero-flat {
    background: linear-gradient(135deg, rgba(160,160,160,0.18), rgba(160,160,160,0.05));
    border-color: var(--text-3);
  }
  /* 라이트 모드 — 흰 카드를 회색 배경에서 띄우고 채도 완화 */
  body.light .score-hero {
    background: #ffffff;
    border: 1px solid rgba(20,25,35,0.08);
    box-shadow: 0 2px 10px rgba(20,25,35,0.06);
  }
  body.light .score-hero-pos {
    background: linear-gradient(135deg, rgba(26,157,84,0.09), #ffffff 60%);
    border-color: rgba(26,157,84,0.28); box-shadow: 0 2px 12px rgba(26,157,84,0.10);
  }
  body.light .score-hero-neg {
    background: linear-gradient(135deg, rgba(224,72,61,0.09), #ffffff 60%);
    border-color: rgba(224,72,61,0.26); box-shadow: 0 2px 12px rgba(224,72,61,0.09);
  }
  body.light .ret-box {
    background: #ffffff; border: 1px solid rgba(20,25,35,0.08);
    box-shadow: 0 2px 10px rgba(20,25,35,0.05);
  }
  body.light .ret-cell.hl { background: #f0f3f8; }
  body.light .ret-divider { background: rgba(20,25,35,0.07); }
  body.light .sc-bar { background: rgba(20,25,35,0.08); }
  body.light .sh-filtered { background: #eef1f5; color: var(--text-2); }
  body.light .sector-info-line { background: #ffffff; border-color: rgba(20,25,35,0.10); }
  body.light .sh-counts .c-bull, body.light .sh-agg .c-bull, body.light .chip.bull, body.light .shn-chip.bull { color: var(--pos); }
  body.light .sh-counts .c-bear, body.light .sh-agg .c-bear, body.light .chip.bear, body.light .shn-chip.bear { color: var(--neg); }
  body.light .shn-chip.bull { background: rgba(26,157,84,0.12); border-color: rgba(26,157,84,0.32); }
  body.light .shn-chip.bear { background: rgba(224,72,61,0.12); border-color: rgba(224,72,61,0.30); }
  body.light .up { color: var(--pos) !important; } body.light .dn { color: var(--neg) !important; }
  .score-hero.is-hold {
    background: linear-gradient(135deg, rgba(180,180,180,0.10), rgba(180,180,180,0.03));
    border-color: var(--text-3);
    opacity: 0.85;
  }
  .sh-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .sh-label { font-size: 12px; color: var(--text-2); font-weight: 600; letter-spacing: 0.02em; }
  .sh-rank {
    font-size: 10.5px; color: var(--text);
    background: rgba(255,255,255,0.18);
    padding: 3px 9px; border-radius: 999px; font-weight: 700;
  }
  .sh-value {
    font-size: 48px; font-weight: 800; line-height: 1;
    color: var(--text); font-variant-numeric: tabular-nums;
    margin: 4px 0 6px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.35);
  }
  .sh-value.sh-counts { font-size: 30px; letter-spacing: -0.01em; }
  .sh-counts .c-bull { color: #4ade80; }
  .sh-counts .c-bear { color: #f87171; }
  .sh-counts .c-sep { color: var(--text-3); margin: 0 8px; font-weight: 400; }
  .score-hero.is-hold .sh-value { font-size: 32px; color: var(--text-2); }
  /* ── 큐레이션 헤드라인 (뉴스가 콘텐츠) ── */
  .sh-filtered {
    font-size: 10px; color: var(--text-2);
    background: rgba(255,255,255,0.10);
    padding: 3px 9px; border-radius: 999px; font-weight: 700;
  }
  .sh-news { display: flex; flex-direction: column; gap: 9px; margin: 9px 0 11px; }
  .shn-item { display: flex; gap: 9px; align-items: flex-start; }
  .shn-chip {
    flex-shrink: 0; font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 6px; margin-top: 2px;
  }
  .shn-chip.bull { background: rgba(74,222,128,0.20); color: #4ade80; border: 1px solid rgba(74,222,128,0.45); }
  .shn-chip.bear { background: rgba(248,113,113,0.20); color: #f87171; border: 1px solid rgba(248,113,113,0.45); }
  .shn-title {
    font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .shn-meta { font-size: 10.5px; color: var(--text-3); margin-top: 2px; }
  .shn-cmt {
    font-size: 11.5px; color: rgba(244,222,170,0.92); line-height: 1.45;
    margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .shn-pi { color: #a78bfa; }
  /* 뉴스 시트 한줄평 */
  .news-row .nr-cmt {
    font-size: 12px; color: rgba(244,222,170,0.92); line-height: 1.5;
    margin: 4px 0 6px;
    padding-left: 8px; border-left: 2px solid rgba(244,200,105,0.4);
  }
  /* 라이트 모드 — 한줄평은 차분한 슬레이트 + 파랑 강조선 (직관적) */
  body.light .shn-cmt, body.light .nr-cmt, body.light .dg-cmt { color: #44506a; }
  body.light .news-row .nr-cmt, body.light .dg-cmt { border-left-color: rgba(37,99,235,0.45); }
  /* 저장 탭 새 소식 다이제스트 */
  .dg-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 16px;
  }
  .dg-head { font-size: 13.5px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
  .dg-row {
    padding: 9px 0; border-top: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
  }
  .dg-row:first-of-type { border-top: none; }
  .dg-row.fresh { background: rgba(255,72,54,0.05); margin: 0 -8px; padding: 9px 8px; border-radius: 8px; }
  .dg-meta { font-size: 10.5px; color: var(--text-3); margin-bottom: 3px; }
  .dg-new { color: #ff4836; font-weight: 800; font-size: 9.5px; }
  .dg-ttl { font-size: 13px; color: var(--text); line-height: 1.45; font-weight: 600; }
  .dg-ttl .up { color: #4ade80; } .dg-ttl .dn { color: #ef4444; }
  .dg-cmt {
    font-size: 11.5px; color: rgba(244,222,170,0.92); line-height: 1.45; margin-top: 3px;
    padding-left: 8px; border-left: 2px solid rgba(244,200,105,0.4);
  }
  .sh-empty { font-size: 13.5px; color: var(--text); line-height: 1.5; margin: 10px 0 12px; }
  .sh-agg { font-size: 12.5px; font-weight: 700; margin: 0 0 10px; }
  .sh-agg .c-bull { color: #4ade80; }
  .sh-agg .c-bear { color: #f87171; }
  .agg-sep { margin: 0 6px; color: var(--text-3); font-weight: 400; }
  .agg-dim { color: var(--text-3); font-weight: 600; }
  .sh-narrative {
    font-size: 14.5px; color: var(--text); font-weight: 700;
    margin-bottom: 12px;
  }
  .sh-overheat {
    background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4);
    border-radius: 8px; padding: 8px 10px; margin-bottom: 10px;
    font-size: 11px; color: #fde68a; line-height: 1.5;
  }
  .sh-confidence {
    background: rgba(0,0,0,0.20); border-radius: 10px;
    padding: 8px 10px 9px; margin-bottom: 10px;
  }
  .sc-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-bottom: 4px; }
  .sc-l { color: var(--text-2); }
  .sc-r { font-weight: 700; }
  .sc-r.sc-hold { color: #cbd5e1; }
  .sc-r.sc-low { color: #fbbf24; }
  .sc-r.sc-normal { color: #60a5fa; }
  .sc-r.sc-high { color: #4ade80; }
  .sc-bar { background: rgba(255,255,255,0.08); height: 5px; border-radius: 99px; overflow: hidden; }
  .sc-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
  .sc-fill.sc-fill-hold { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
  .sc-fill.sc-fill-low { background: linear-gradient(90deg, #fbbf24, #fde047); }
  .sc-fill.sc-fill-normal { background: linear-gradient(90deg, #60a5fa, #93c5fd); }
  .sc-fill.sc-fill-high { background: linear-gradient(90deg, #4ade80, #86efac); }
  .sc-meta { font-size: 10px; color: var(--text-3); margin-top: 5px; text-align: right; }
  .sh-cta {
    display: flex; justify-content: flex-end; align-items: center; gap: 4px;
    font-size: 11.5px; color: var(--text-2); font-weight: 600;
  }
  .sh-cta .arr { font-size: 14px; }

  /* ─── 수익률 박스 ─── */
  .ret-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .ret-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .ret-row:has(.hl) { grid-template-columns: 1fr 1fr; gap: 8px; }
  .ret-cell { text-align: center; padding: 4px 2px; }
  .ret-cell.hl { background: rgba(255,255,255,0.06); border-radius: 8px; padding: 6px 4px; }
  .rc-lbl { font-size: 9.5px; color: var(--text-3); margin-bottom: 3px; letter-spacing: 0.03em; }
  .rc-val { font-size: 15px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1.1; }
  .ret-cell.hl .rc-val { font-size: 17px; }
  .rc-val.up { color: #4ade80; }
  .rc-val.dn { color: #ef4444; }
  .ret-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 10px 0; }

  /* ─── CTA 버튼 ─── */
  .cta-row { display: flex; gap: 8px; margin: 10px 0 8px; }
  .cta-btn {
    flex: 1; padding: 12px 10px;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: var(--text); font-size: 13px; font-weight: 700;
    border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s;
  }
  .cta-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.15); }
  .cta-news { border-color: rgba(96,165,250,0.45); background: rgba(96,165,250,0.15); }
  .cta-news:active { background: rgba(96,165,250,0.28); }
  .cta-score { border-color: rgba(250,204,21,0.45); background: rgba(250,204,21,0.13); }
  .cta-score:active { background: rgba(250,204,21,0.25); }
  .cta-btn .arr { font-size: 16px; opacity: 0.85; }

  /* ─── 점수 모달: 이 점수의 근거 ─── */
  .ev-grid {
    background: rgba(255,255,255,0.04); border-radius: 12px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .ev-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px;
  }
  .ev-l { color: var(--text-2); }
  .ev-r { color: var(--text); font-weight: 600; text-align: right; }
  .ev-r .up { color: #4ade80; }
  .ev-r .dn { color: #ef4444; }
  .ev-bar { background: rgba(255,255,255,0.08); height: 6px; border-radius: 99px; overflow: hidden; margin: 2px 0 6px; }

  .change-hero {
    font-size: 56px; font-weight: 800;
    line-height: 1; margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }
  .change-hero.up { color: #4ade80; text-shadow: 0 0 30px rgba(74,222,128,0.45); }
  .change-hero.dn { color: #ef4444; text-shadow: 0 0 30px rgba(239,68,68,0.45); }
  .change-hero.flat { color: #aaa39a; }
  .change-sub { font-size: 11px; opacity: 0.65; margin-bottom: 18px; font-variant-numeric: tabular-nums; }

  /* 종목 vs 코스피 비교 박스 */
  .compare-box {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 14px;
  }
  .compare-box.compare-2x2 { gap: 5px; }
  .compare-box .cmp-cell {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 8px;
    text-align: center;
  }
  .compare-box .cmp-cell .lbl {
    font-size: 9.5px; opacity: 0.55;
    text-transform: uppercase; letter-spacing: 0.03em;
    margin-bottom: 3px;
  }
  .compare-box .cmp-cell .val {
    font-size: 16px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .compare-box .cmp-cell .val.up { color: #4ade80; }
  .compare-box .cmp-cell .val.dn { color: #ef4444; }
  .compare-box .cmp-cell .val.flat { color: var(--text-2); }
  .compare-box .cmp-cell .sub-lbl {
    font-size: 9px; opacity: 0.45;
    margin-top: 4px;
  }
  .compare-box .cmp-cell.stock { background: rgba(255,255,255,0.07); }
  .compare-box .cmp-cell.bench { background: rgba(244,200,105,0.06); border-color: rgba(244,200,105,0.15); }

  .why-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .why-label { font-size: 9px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
  .why-hint { text-transform: none; letter-spacing: 0; opacity: 0.55; font-size: 8.5px; }
  .why-txt { font-size: 13px; line-height: 1.45; font-weight: 500; }
  .why-txt b { color: #4ade80; font-weight: 700; }
  .why-txt.dn b { color: #ef4444; }

  /* metrics row */
  .metrics {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 6px; margin-bottom: 14px;
    font-size: 10px;
  }
  .metric {
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 6px 8px;
    text-align: center;
  }
  .metric .l { opacity: 0.55; font-size: 9px; }
  .metric .v { font-size: 14px; font-weight: 700; margin-top: 1px; font-variant-numeric: tabular-nums; }

  .trust-badge {
    font-size: 10px;
    padding: 4px 10px; border-radius: 999px;
    align-self: flex-start;
    margin-bottom: auto;
    border: 1px solid;
  }
  .trust-badge.high { background: rgba(74,222,128,0.18); color: #4ade80; border-color: rgba(74,222,128,0.4); }
  .trust-badge.mid  { background: rgba(244,200,105,0.18); color: #f4c869; border-color: rgba(244,200,105,0.4); }
  .trust-badge.low  { background: rgba(255,255,255,0.10); color: var(--text-2); border-color: var(--text-3); }
  .trust-badge.mystery { background: rgba(167,139,250,0.18); color: #a78bfa; border-color: rgba(167,139,250,0.4); }

  /* 저장 버튼 — 카드 우측 상단 */
  .save-chip {
    position: absolute; top: 50px; right: 14px;
    z-index: 9;
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease;
    filter: grayscale(1) opacity(0.7);
  }
  .save-chip:active { transform: scale(0.92); }
  .save-chip.on {
    background: rgba(250,204,21,0.22);
    border-color: rgba(250,204,21,0.5);
    filter: none;
  }

  /* swipe hint */
  .swipe-hint {
    position: absolute; bottom: 70px; left: 0; right: 0;
    text-align: center;
    color: var(--text-3);
    font-size: 9px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    pointer-events: none;
    animation: bounce 1.8s infinite;
  }
  .swipe-hint .arrow { font-size: 12px; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* bottom nav */
  .bot-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 6px 0 calc(8px + env(safe-area-inset-bottom, 0px));
    background: var(--nav-bg);
    backdrop-filter: blur(14px);
    border-top: 0.5px solid rgba(255,255,255,0.1);
    font-size: 10px;
    color: var(--text-3);
    z-index: 15;
  }
  .bot-nav .it { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 14px; position: relative; }
  .nav-dot {
    position: absolute; top: 0; right: 8px;
    min-width: 15px; height: 15px; padding: 0 4px;
    background: #ff4836; color: #fff;
    border-radius: 999px; font-size: 9px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .bot-nav .it .em { font-size: 16px; }
  .bot-nav .it.on { color: var(--text); }

  /* ─── 글씨 크게 모드 (설정) — 핵심 가독 텍스트만 확대 ─── */
  body.fontL .shn-title { font-size: 16px; }
  body.fontL .shn-cmt, body.fontL .nr-cmt, body.fontL .dg-cmt { font-size: 13.5px; }
  body.fontL .sh-narrative { font-size: 16px; }
  body.fontL .news-row .ttl, body.fontL .dg-ttl { font-size: 15px; }
  body.fontL .reel h3 { font-size: 26px; }
  body.fontL .sh-agg { font-size: 14px; }
  body.fontL .rc-val { font-size: 16px; }
  body.fontL .ret-cell.hl .rc-val { font-size: 19px; }

  /* ─── 설정 탭 ─── */
  .settings-view {
    position: absolute; inset: 0; bottom: 56px;
    background: var(--page-bg); z-index: 12;
    display: none; flex-direction: column;
    padding: calc(max(env(safe-area-inset-top,0px),10px) + 20px) 20px 20px;
    overflow-y: auto;
  }
  .settings-view.open { display: flex; }
  .settings-view h2 { font-size: 22px; margin-bottom: 18px; }
  .set-group { margin-bottom: 22px; }
  .set-group .set-label { font-size: 12px; color: var(--text-3); font-weight: 700; margin-bottom: 8px; letter-spacing: 0.02em; }
  .set-seg { display: flex; gap: 6px; }
  .set-seg button {
    flex: 1; padding: 12px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-2); font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .set-seg button.on { border-color: var(--accent); background: var(--surface-2); color: var(--text); }
  .set-note { font-size: 11px; color: var(--text-3); margin-top: 10px; line-height: 1.5; }

  /* ─── 점수를 클릭 가능하게 ─── */
  .change-hero, .change-sub { cursor: pointer; }
  .change-hero:active { transform: scale(0.97); transition: transform 0.1s; }
  .score-hint {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    opacity: 0.4;
    border: 1px solid currentColor;
    width: 14px; height: 14px;
    border-radius: 50%;
    line-height: 12px; text-align: center;
    vertical-align: middle;
  }

  /* ─── Bottom Sheet 모달 (공통) ─── */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-height: 82vh;
    max-height: 82dvh;   /* 모바일 주소창 변동 대응 */
    height: auto;
    background: var(--sheet-bg);
    border-radius: 18px 18px 0 0;
    z-index: 51;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.22, .9, .3, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 500px) {
    .sheet { left: 50%; transform: translate(-50%, 100%); width: 374px; }
    .sheet.open { transform: translate(-50%, 0); }
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: rgba(255,255,255,0.25);
    border-radius: 999px; margin: 8px auto 4px;
    flex-shrink: 0;
  }
  .sheet-head {
    padding: 8px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .sheet-head h3 { font-size: 16px; color: var(--text); margin-bottom: 2px; }
  .sheet-head .sub { font-size: 11px; color: var(--text-3); }
  .sheet-body {
    flex: 1; overflow-y: auto;
    min-height: 0;
    padding: 14px 18px;
    padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;   /* 리스트 스크롤이 뒤 reels로 전파 방지 */
    touch-action: pan-y;
  }

  /* ─── 점수 설명 모달 (가독성·신뢰감 강화) ─── */
  .score-explain section {
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .score-explain section:last-child { border-bottom: none; }
  .score-explain h4 {
    font-size: 11px; color: #f4c869;
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 10px; font-weight: 700;
  }
  .score-explain p {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
  }
  .score-explain p b { color: #4ade80; font-weight: 700; }
  .score-explain p .dn { color: #ef4444; font-weight: 700; }

  /* 한 줄 해석 — 구조화된 grid */
  .score-explain .attr-grid {
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .score-explain .attr-row {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 12px 14px;
    align-items: center;
  }
  .score-explain .attr-row .icon-cell {
    font-size: 22px;
    text-align: center;
    line-height: 1;
  }
  .score-explain .attr-row .body-cell {
    line-height: 1.5;
  }
  .score-explain .attr-row .title {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .score-explain .attr-row .value {
    font-size: 15px; color: var(--text); font-weight: 600;
  }
  .score-explain .attr-row .value .pos { color: #4ade80; }
  .score-explain .attr-row .value .neg { color: #ef4444; }
  .score-explain .attr-row .value .flat { color: var(--text-3); }
  .score-explain .attr-row .extra {
    font-size: 11px; color: var(--text-3);
    margin-top: 3px;
  }
  .score-explain .match-box {
    border-radius: 10px; padding: 14px;
    margin-top: 4px;
    display: flex; align-items: center; gap: 12px;
  }
  .score-explain .match-box.ok {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.3);
  }
  .score-explain .match-box.gap {
    background: rgba(244,200,105,0.08);
    border: 1px solid rgba(244,200,105,0.3);
  }
  .score-explain .match-box.mystery {
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.3);
  }
  .score-explain .match-box .em { font-size: 22px; flex-shrink: 0; }
  .score-explain .match-box .verdict {
    font-size: 13px; line-height: 1.5;
    color: var(--text);
  }
  .score-explain .match-box .verdict b { font-weight: 700; }
  .score-explain .match-box.ok .verdict b { color: #4ade80; }
  .score-explain .match-box.gap .verdict b { color: #f4c869; }
  .score-explain .match-box.mystery .verdict b { color: #a78bfa; }

  /* 공식 분해 — 큰 글씨 */
  .score-explain .formula-grid {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 8px 12px;
    font-size: 14px;
    margin: 10px 0;
  }
  .score-explain .formula-grid .label { color: var(--text); }
  .score-explain .formula-grid .weight {
    color: var(--text-3);
    font-variant-numeric: tabular-nums; font-size: 12px;
    align-self: center;
  }
  .score-explain .formula-grid .val {
    color: var(--text); font-weight: 700; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .score-explain .formula-grid .val.up { color: #4ade80; }
  .score-explain .formula-grid .val.dn { color: #ef4444; }
  .score-explain .formula-grid .total {
    grid-column: 1 / -1;
    border-top: 1.5px solid rgba(255,255,255,0.15);
    padding-top: 10px; margin-top: 6px;
    display: flex; justify-content: space-between;
    font-size: 17px; font-weight: 800;
    color: #ff4836;
  }

  /* 신뢰 섹션 — Hero 형식 */
  .score-explain .trust-hero {
    background: linear-gradient(135deg, rgba(74,222,128,0.12), rgba(74,222,128,0.04));
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
    text-align: center;
  }
  .score-explain .trust-hero .big-num {
    font-size: 48px; font-weight: 800; color: #4ade80;
    line-height: 1; margin-bottom: 4px;
    text-shadow: 0 0 24px rgba(74,222,128,0.3);
  }
  .score-explain .trust-hero .big-label {
    font-size: 13px; color: var(--text);
    margin-bottom: 8px;
  }
  .score-explain .trust-hero .big-context {
    font-size: 11px; color: var(--text-3);
    font-style: italic;
  }
  .score-explain .trust-row {
    display: flex; justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    align-items: center;
  }
  .score-explain .trust-row .l { color: var(--text-2); }
  .score-explain .trust-row .v { color: var(--text); font-weight: 700; }
  .score-explain .trust-row .v.up { color: #4ade80; }
  .score-explain .trust-row .v.flat { color: var(--text-2); }

  /* 섹터 비교 박스 */
  .score-explain .sector-compare {
    background: rgba(244,200,105,0.05);
    border: 1px solid rgba(244,200,105,0.2);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .score-explain .sec-row {
    display: flex; justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .score-explain .sec-row:last-child { border-bottom: none; }
  .score-explain .sec-row .l { color: var(--text-2); }
  .score-explain .sec-row .v { color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-explain .sec-row .v.up { color: #4ade80; }
  .score-explain .sec-row .v.dn { color: #ef4444; }

  /* 어떻게 만들어졌나 stack */
  .score-explain .method-stack {
    display: flex; flex-direction: column; gap: 8px;
  }
  .score-explain .method-step {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .score-explain .method-step .num {
    background: #ff4836; color: var(--text);
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .score-explain .method-step .desc {
    font-size: 13px; color: var(--text);
    line-height: 1.45;
  }
  .score-explain .method-step .desc b { color: #f4c869; font-weight: 700; }

  /* 정직한 한계 박스 */
  .score-explain .limits-box {
    background: rgba(255,72,54,0.06);
    border-left: 3px solid rgba(255,72,54,0.5);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    font-size: 12.5px;
    color: var(--text-2);
    line-height: 1.55;
  }
  .score-explain .limits-box b { color: #ff8b7a; font-weight: 700; }

  /* ─── 뉴스 모달 ─── */
  .news-list .news-row {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
  }
  .news-list .news-row:active { background: rgba(255,255,255,0.03); }
  .news-list .news-row .meta-row {
    display: flex; justify-content: space-between;
    font-size: 10px; margin-bottom: 4px;
  }
  .news-list .news-row .src { color: #f4c869; font-weight: 600; }
  .news-list .news-row .time { color: var(--text-3); }
  .news-list .news-row .ttl {
    font-size: 13px; color: var(--text); line-height: 1.4;
    margin-bottom: 5px;
  }
  .news-list .news-row .chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .news-list .news-row .chip {
    font-size: 9px; padding: 1px 6px; border-radius: 3px;
    border: 1px solid; font-weight: 600;
  }
  .chip.bull { color: #4ade80; border-color: rgba(74,222,128,0.4); }
  .chip.bear { color: #ef4444; border-color: rgba(239,68,68,0.4); }
  .chip.sub { color: #f4c869; border-color: rgba(244,200,105,0.4); }
  .chip.cat { color: var(--text-2); border-color: var(--text-3); }
  .chip.priced { color: #a78bfa; border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.1); }
  /* 섹터 탭 카드 */
  .sec-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
