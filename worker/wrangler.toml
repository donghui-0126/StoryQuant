name = "storyquant"
main = "index.js"
compatibility_date = "2026-06-01"

# 정적 앱 (shorts.html) — deploy/build-public.sh 가 ./public 에 복사
[assets]
directory = "./public"
binding = "ASSETS"

# 백엔드 터널 주소 저장용 KV — deploy/setup.sh 가 생성 후 id 를 채움
[[kv_namespaces]]
binding = "CFG"
id = "REPLACE_WITH_KV_ID"

[observability]
enabled = true
